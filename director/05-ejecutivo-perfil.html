<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Director · Perfil Ejecutivo</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .profile-header {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; margin-bottom: 16px;
  }
  .profile-meta__label { font-size: 10.5px; color: var(--text-disabled); text-transform: uppercase; font-weight: 600; letter-spacing: 0.06em; }
  .profile-meta__value { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .stat-ring {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .activity-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    transition: background 180ms; cursor: pointer;
  }
  .activity-row:hover { background: var(--page-bg); }
  .activity-row__icon {
    width: 40px; height: 40px; border-radius: 8px;
    background: var(--primary-bg); color: var(--primary);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .activity-row__icon--llamada { background: #E8F5EE; color: var(--success); }
  .activity-row__icon--email { background: #F3E8FF; color: #7C3AED; }
  .activity-row__icon--visita { background: var(--accent-bg); color: #C7770D; }
  .activity-row__icon--reunion { background: var(--primary-bg); color: var(--primary); }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
window.modalRoot = document.getElementById('shell');
function openModal(html) { modalRoot.innerHTML += html; }
function closeModal() {
  const overlays = document.querySelectorAll('.modal-overlay');
  if (overlays.length > 0) overlays[overlays.length - 1].remove();
}

const URL_PARAMS = new URLSearchParams(window.location.search);
const ejecutivoId = URL_PARAMS.get('id') || 'JP';

const ejecutivoData = {
  name: 'Diana',
  depto: 'Medellín',
  avatar: 'DI',
  color: 1,
  ventas: '$ 698 M',
  meta: '$ 600 M',
  metaPct: 116,
  tendencia: '▲ +20%',
  email: 'diana@extrucol.co',
  phone: '+57 310 555 1234',
  joined: '15 Ene 2024',
  comp: 95,
  leads: [
    { titulo: 'Consulta tubería INGEOMEGA', empresa: 'INGEOMEGA', origen: 'WhatsApp', score: 100, estado: 'INTERESADO' },
    { titulo: 'Proyecto RB de Colombia', empresa: 'RB DE COLOMBIA SA', origen: 'Instagram', score: 80, estado: 'CONTACTADO' },
    { titulo: 'Cotización CMM Manizales', empresa: 'CMM', origen: 'Facebook', score: 80, estado: 'INTERESADO' },
    { titulo: 'Seguimiento MONTAJES JM', empresa: 'MONTAJES JM', origen: 'WhatsApp', score: 60, estado: 'NUEVO' },
  ],
  oportunidades: [
    { titulo: 'Sistema acueducto INGEOMEGA', empresa: 'INGEOMEGA', valor: '$ 397 M', estado: 'NEGOCIACION', fecha: '20 Mar', prob: 80 },
    { titulo: 'Obra civil MONTAJES JM', empresa: 'MONTAJES JM', valor: '$ 15 M', estado: 'NEGOCIACION', fecha: '18 Mar', prob: 80 },
    { titulo: 'Construcción ADOS INGENIERIA', empresa: 'ADOS INGENIERIA', valor: '$ 98 M', estado: 'NEGOCIACION', fecha: '15 Mar', prob: 80 },
    { titulo: 'Consorcio ING Santa Elena', empresa: 'CONSORCIO ING SANTA ELENA', valor: '$ 152 M', estado: 'PROPUESTA', fecha: '10 Mar', prob: 60 },
  ],
  actividades: [
    { tipo: 'visita', iconClass: 'visita', titulo: 'Visita técnica - INGEOMEGA', sub: 'Revisión especificaciones técnicas', date: '10:30 AM', day: 'Hoy', badge: 'ganada', badgeText: 'Completada' },
    { tipo: 'llamada', iconClass: 'llamada', titulo: 'Llamada seguimiento - ADOS', sub: 'Negociación de términos', date: '9:00 AM', day: 'Hoy', badge: 'ganada', badgeText: 'Completada' },
    { tipo: 'reunion', iconClass: 'reunion', titulo: 'Reunión virtual - CMM', sub: 'Presentación portafolio productos', date: '3:00 PM', day: 'Hoy', badge: 'prospecto', badgeText: 'Agendada' },
    { tipo: 'email', iconClass: 'email', titulo: 'Email - CONSORCIO ING', sub: 'Envío de propuesta técnica', date: '8:15 AM', day: 'Ayer', badge: 'ganada', badgeText: 'Completada' },
  ]
};

let currentTab = 'resumen';

function tabsContent() {
  const tabs = [
    { id: 'resumen', label: 'Resumen' },
    { id: 'leads', label: `Leads (${ejecutivoData.leads.length})` },
    { id: 'oportunidades', label: `Oportunidades (${ejecutivoData.oportunidades.length})` },
    { id: 'actividades', label: `Actividades (${ejecutivoData.actividades.length})` },
  ];
  return tabs.map(t => `
    <a class="tab ${currentTab === t.id ? 'is-active' : ''}" onclick="switchTab('${t.id}')">${t.label}</a>
  `).join('');
}

function switchTab(tab) {
  currentTab = tab;
  renderMainContent();
}

function renderMainContent() {
  const mainArea = document.querySelector('.main-area');
  mainArea.innerHTML = renderTopbar({ title: ejecutivoData.name, breadcrumb: ['Equipo comercial', 'Perfil ejecutivo'] }) + content();
}

function resumenTab() {
  return `
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;">
      <div class="stat-card">
        <div class="stat-card__label">Ventas mes</div>
        <div class="stat-card__value stat-card__value--accent">${ejecutivoData.ventas}</div>
        <div class="stat-card__subtext">${ejecutivoData.tendencia} vs mes anterior</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Meta mensual</div>
        <div class="stat-card__value">${ejecutivoData.meta}</div>
        <div class="stat-card__subtext">${ejecutivoData.metaPct}% alcanzado</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Leads activos</div>
        <div class="stat-card__value">${ejecutivoData.leads.length}</div>
        <div class="stat-card__subtext">En seguimiento</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__label">Cumplimiento</div>
        <div class="stat-card__value stat-card__value--success">${ejecutivoData.comp}%</div>
        <div class="stat-card__subtext">Actividades</div>
      </div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;">
      <div class="card">
        <div class="card__header"><div class="card__title">Leads por estado</div></div>
        <div class="card__body">
          <div style="display: flex; flex-direction: column; gap: 8px;">
            ${[['INTERESADO', 2, 'var(--success)'], ['CONTACTADO', 1, 'var(--primary)'], ['NUEVO', 1, 'var(--accent)'], ['DESCALIFICADO', 1, 'var(--error)']].map(([label, count, color]) => `
              <div style="display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 8px;">
                  <span style="width: 10px; height: 10px; border-radius: 50%; background: ${color};"></span>
                  <span style="font-size: 13px;">${label}</span>
                </div>
                <span style="font-weight: 700; font-size: 14px;">${count}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card__header"><div class="card__title">Oportunidades por estado</div></div>
        <div class="card__body">
          <div style="display: flex; flex-direction: column; gap: 8px;">
            ${[['PROSPECTO', 1, '#3B82F6'], ['CALIFICACION', 1, '#F97316'], ['PROPUESTA', 1, '#A855F7'], ['NEGOCIACION', 1, '#EAB308']].map(([label, count, color]) => `
              <div style="display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 8px;">
                  <span style="width: 10px; height: 10px; border-radius: 50%; background: ${color};"></span>
                  <span style="font-size: 13px;">${label}</span>
                </div>
                <span style="font-weight: 700; font-size: 14px;">${count}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card__header"><div class="card__title">Actividades recientes</div></div>
        <div class="card__body">
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <div style="display: flex; align-items: center; justify-content: space-between;">
              <span style="font-size: 13px;">Completadas hoy</span>
              <span style="font-weight: 700; color: var(--success);">2</span>
            </div>
            <div style="display: flex; align-items: center; justify-content: space-between;">
              <span style="font-size: 13px;">Agendadas</span>
              <span style="font-weight: 700; color: var(--primary);">1</span>
            </div>
            <div style="display: flex; align-items: center; justify-content: space-between;">
              <span style="font-size: 13px;">Esta semana</span>
              <span style="font-weight: 700;">${ejecutivoData.actividades.length}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card__header">
        <div class="card__title">Últimas actividades</div>
        <button class="btn btn--ghost btn--sm" onclick="switchTab('actividades')">Ver todas</button>
      </div>
      <div class="card__body" style="padding: 0;">
        ${ejecutivoData.actividades.slice(0, 3).map(a => `
          <a href="../ejecutivo/18-actividad-detalle.html" style="display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; cursor: pointer; transition: background 150ms;" onmouseover="this.style.background='var(--page-bg)'" onmouseout="this.style.background=''">
            <div class="activity-row__icon activity-row__icon--${a.iconClass}">${Icons[a.tipo === 'visita' ? 'mapPin' : a.tipo === 'llamada' ? 'phone' : a.tipo === 'email' ? 'envelope' : 'users']}</div>
            <div style="flex:1; min-width: 0;">
              <div style="font-size: 14px; font-weight: 600; color: var(--text-primary);">${a.titulo}</div>
              <div style="font-size: 12.5px; color: var(--text-muted);">${a.sub}</div>
            </div>
            <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0;">
              <span class="badge badge--${a.badge}"><span class="dot"></span> ${a.badgeText}</span>
              <span style="font-size: 12px; color: var(--text-muted);">${a.day} · ${a.date}</span>
            </div>
          </a>
        `).join('')}
      </div>
    </div>
  `;
}

function leadsTab() {
  const estadoColors = { 'INTERESADO': 'ganada', 'CONTACTADO': 'propuesta', 'NUEVO': 'prospecto', 'DESCALIFICADO': 'perdida' };
  return `
    <div class="card" style="padding: 0;">
      <div class="card__header">
        <div class="card__title">Leads de ${ejecutivoData.name}</div>
        <span style="font-size: 13px; color: var(--text-muted);">${ejecutivoData.leads.length} leads</span>
      </div>
      <div class="card__body" style="padding: 0;">
        ${ejecutivoData.leads.map(l => `
          <a href="../ejecutivo/10-lead-detalle.html" style="display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; cursor: pointer; transition: background 150ms;" onmouseover="this.style.background='var(--page-bg)'" onmouseout="this.style.background=''">
            <div style="flex: 1; min-width: 0;">
              <div style="font-size: 14px; font-weight: 600; color: var(--text-primary);">${l.titulo}</div>
              <div style="font-size: 12px; color: var(--text-muted);">${l.empresa} · ${l.origen}</div>
            </div>
            <div style="display: flex; align-items: center; gap: 12px; flex-shrink: 0;">
              <span style="font-size: 12px; color: var(--accent); font-weight: 700;">${Icons.fire} ${l.score}%</span>
              <span class="badge badge--${estadoColors[l.estado]}">${l.estado}</span>
              ${Icons.chevronRight}
            </div>
          </a>
        `).join('')}
      </div>
    </div>
  `;
}

function oportunidadesTab() {
  const oppEstadoColors = { 'PROSPECTO': 'prospecto', 'PROPUESTA': 'propuesta', 'NEGOCIACION': 'negociacion', 'GANADA': 'ganada', 'PERDIDA': 'perdida' };
  return `
    <div class="card" style="padding: 0;">
      <div class="card__header">
        <div class="card__title">Oportunidades de ${ejecutivoData.name}</div>
        <span style="font-size: 13px; color: var(--text-muted);">${ejecutivoData.oportunidades.length} oportunidades</span>
      </div>
      <div class="card__body" style="padding: 0;">
        ${ejecutivoData.oportunidades.map(o => `
          <a href="../ejecutivo/04-oportunidad-detalle.html" style="display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; cursor: pointer; transition: background 150ms;" onmouseover="this.style.background='var(--page-bg)'" onmouseout="this.style.background=''">
            <div style="flex: 1; min-width: 0;">
              <div style="font-size: 14px; font-weight: 600; color: var(--text-primary);">${o.titulo}</div>
              <div style="font-size: 12px; color: var(--text-muted);">${o.empresa} · ${o.fecha}</div>
            </div>
            <div style="display: flex; align-items: center; gap: 12px; flex-shrink: 0;">
              <div style="text-align: right;">
                <div style="font-size: 14px; font-weight: 700; color: var(--accent);">${o.valor}</div>
                <div style="font-size: 11px; color: var(--text-muted);">${o.prob}% prob</div>
              </div>
              <span class="badge badge--${oppEstadoColors[o.estado]}">${o.estado}</span>
              ${Icons.chevronRight}
            </div>
          </a>
        `).join('')}
      </div>
    </div>
  `;
}

function actividadesTab() {
  return `
    <div class="card" style="padding: 0;">
      <div class="card__header">
        <div class="card__title">Actividades de ${ejecutivoData.name}</div>
        <span style="font-size: 13px; color: var(--text-muted);">${ejecutivoData.actividades.length} actividades</span>
      </div>
      <div class="card__body" style="padding: 0;">
        ${ejecutivoData.actividades.map(a => `
          <a href="../ejecutivo/18-actividad-detalle.html" style="display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; cursor: pointer; transition: background 150ms;" onmouseover="this.style.background='var(--page-bg)'" onmouseout="this.style.background=''">
            <div class="activity-row__icon activity-row__icon--${a.iconClass}">${Icons[a.tipo === 'visita' ? 'mapPin' : a.tipo === 'llamada' ? 'phone' : a.tipo === 'email' ? 'envelope' : 'users']}</div>
            <div style="flex:1; min-width: 0;">
              <div style="font-size: 14px; font-weight: 600; color: var(--text-primary);">${a.titulo}</div>
              <div style="font-size: 12.5px; color: var(--text-muted);">${a.sub}</div>
            </div>
            <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0;">
              <span class="badge badge--${a.badge}"><span class="dot"></span> ${a.badgeText}</span>
              <span style="font-size: 12px; color: var(--text-muted);">${a.day} · ${a.date}</span>
            </div>
          </a>
        `).join('')}
      </div>
    </div>
  `;
}

function content() {
  let tabContent = '';
  if (currentTab === 'resumen') tabContent = resumenTab();
  else if (currentTab === 'leads') tabContent = leadsTab();
  else if (currentTab === 'oportunidades') tabContent = oportunidadesTab();
  else if (currentTab === 'actividades') tabContent = actividadesTab();

  const metaColor = ejecutivoData.metaPct >= 100 ? 'var(--success)' : ejecutivoData.metaPct >= 80 ? 'var(--accent)' : 'var(--error)';

  return `
    <div class="content">
      <div class="profile-header">
        <div style="display: flex; align-items: flex-start; gap: 20px; margin-bottom: 20px;">
          <div class="avatar avatar--xl avatar--color-${ejecutivoData.color}">${ejecutivoData.avatar}</div>
          <div style="flex: 1;">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 4px;">
              <span style="font-size: 22px; font-weight: 800; color: var(--text-primary);">${ejecutivoData.name}</span>
              <span class="badge badge--${ejecutivoData.metaPct >= 100 ? 'ganada' : 'calificacion'}">${ejecutivoData.metaPct}% meta</span>
            </div>
            <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px;">${ejecutivoData.depto}</div>
            <div style="display: flex; gap: 16px; font-size: 12px; color: var(--text-muted);">
              <span>${Icons.envelope} ${ejecutivoData.email}</span>
              <span>${Icons.phone} ${ejecutivoData.phone}</span>
              <span>${Icons.calendar} Desde ${ejecutivoData.joined}</span>
            </div>
          </div>
          <div style="display: flex; gap: 8px;">
            <button class="btn btn--secondary btn--sm">${Icons.chartBar} Ver histórico</button>
            <button class="btn btn--primary btn--sm">${Icons.bell} Notificar</button>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; padding-top: 16px; border-top: 1px solid var(--border);">
          <div>
            <div class="profile-meta__label">Ventas mes</div>
            <div class="profile-meta__value" style="color: var(--accent);">${ejecutivoData.ventas}</div>
          </div>
          <div>
            <div class="profile-meta__label">Meta</div>
            <div class="profile-meta__value">${ejecutivoData.meta}</div>
          </div>
          <div>
            <div class="profile-meta__label">Oportunidades</div>
            <div class="profile-meta__value">${ejecutivoData.oportunidades.length}</div>
          </div>
          <div>
            <div class="profile-meta__label">Leads</div>
            <div class="profile-meta__value">${ejecutivoData.leads.length}</div>
          </div>
          <div>
            <div class="profile-meta__label">Cumplimiento</div>
            <div class="profile-meta__value" style="color: ${metaColor};">${ejecutivoData.comp}%</div>
          </div>
        </div>
      </div>

      <div class="tabs" style="margin-bottom: 16px;">
        ${tabsContent()}
      </div>

      ${tabContent}
    </div>
  `;
}

document.getElementById('shell').innerHTML = `
  ${renderSidebar('equipo', 'director')}
  <div class="main-area">
    ${renderTopbar({ title: ejecutivoData.name, breadcrumb: ['Equipo comercial', 'Perfil ejecutivo'] })}
    ${content()}
  </div>
`;
</script>
</body>
</html>
