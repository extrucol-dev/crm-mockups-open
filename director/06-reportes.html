<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Director · Reportes</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
function content() {
  const reportes = [
    { title: 'Ventas por período', desc: 'Comparativo mensual, trimestral y anual', icon: 'chartBar', cat: 'Ventas' },
    { title: 'Pipeline por ejecutivo', desc: 'Distribución de oportunidades por vendedor', icon: 'users', cat: 'Equipo' },
    { title: 'Conversión Lead → Oportunidad', desc: 'Tasa de conversión por origen', icon: 'funnel', cat: 'Conversión' },
    { title: 'Análisis por sector', desc: 'Rendimiento en agua, gas, agro, industria', icon: 'building', cat: 'Sectores' },
    { title: 'Motivos de cierre', desc: 'Razones de ganadas y perdidas', icon: 'chartPie', cat: 'Cierre' },
    { title: 'Actividades por ejecutivo', desc: 'Número y tipo de actividades registradas', icon: 'clipboardCheck', cat: 'Actividad' },
    { title: 'Clientes nuevos vs recurrentes', desc: 'Ratio según monto mínimo configurado', icon: 'users', cat: 'Clientes' },
    { title: 'Forecasting trimestral', desc: 'Proyección de ventas por probabilidad', icon: 'trendingUp', cat: 'Forecast' },
    { title: 'Origen de leads', desc: 'Eficiencia por canal de captación', icon: 'globe', cat: 'Marketing' },
  ];

  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Reportes</div>
          <div class="page-head__subtitle">Biblioteca de reportes gerenciales</div>
        </div>
        <div class="page-head__actions">
          <button class="btn btn--secondary btn--sm">${Icons.plus} Crear reporte personalizado</button>
        </div>
      </div>

      <div class="filter-bar">
        <div class="input-wrapper" style="flex:1; max-width: 320px;">
          ${Icons.search}<input class="input input--with-icon" placeholder="Buscar reporte...">
        </div>
        <div style="display: flex; gap: 6px;">
          <button class="btn btn--ghost btn--sm" style="background: var(--primary-bg); color: var(--primary);">Todos</button>
          <button class="btn btn--ghost btn--sm">Ventas</button>
          <button class="btn btn--ghost btn--sm">Equipo</button>
          <button class="btn btn--ghost btn--sm">Conversión</button>
          <button class="btn btn--ghost btn--sm">Sectores</button>
          <button class="btn btn--ghost btn--sm">Forecast</button>
        </div>
      </div>

      <div class="card" style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; border: none; margin-bottom: 20px;">
        <div style="padding: 24px; display: flex; align-items: center; gap: 24px;">
          <div style="flex: 1;">
            <span style="font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.8;">Reporte del mes</span>
            <div style="font-size: 20px; font-weight: 800; margin-top: 6px; margin-bottom: 6px;">Análisis comparativo Abril 2026</div>
            <div style="font-size: 13px; opacity: 0.85;">Revisión ejecutiva del período · 9 KPIs principales · Generado automáticamente</div>
          </div>
          <button class="btn" style="background: var(--accent); color: #fff;">${Icons.download} Descargar PDF</button>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;">
        ${reportes.map(r => `
          <div class="card" style="padding: 18px; cursor: pointer;">
            <div style="display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px;">
              <div style="width: 44px; height: 44px; border-radius: 10px; background: var(--primary-bg); color: var(--primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                ${Icons[r.icon]}
              </div>
              <div style="flex: 1; min-width: 0;">
                <span class="badge badge--neutral" style="margin-bottom: 6px; font-size: 10px;">${r.cat}</span>
                <div style="font-weight: 700; font-size: 14px; color: var(--text-primary); line-height: 1.3;">${r.title}</div>
                <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">${r.desc}</div>
              </div>
            </div>
            <div style="display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border);">
              <button class="btn btn--ghost btn--sm" style="flex: 1;">${Icons.view} Ver</button>
              <button class="btn btn--ghost btn--sm">${Icons.download}</button>
            </div>
          </div>
        `).join('')}
      </div>

      <div class="card" style="margin-top: 20px; padding: 0;">
        <div class="card__header" style="padding: 16px;">
          <div>
            <div class="card__title">Reportes recientes</div>
            <div class="card__subtitle">Últimos reportes generados por ti</div>
          </div>
        </div>
        <div>
          ${[
            { title: 'Pipeline por ejecutivo · Abril 2026', ago: 'Hace 2 horas', size: '2.4 MB' },
            { title: 'Análisis por sector · Q1 2026', ago: 'Ayer', size: '4.1 MB' },
            { title: 'Forecasting trimestral · Q2 2026', ago: 'Hace 3 días', size: '1.8 MB' },
            { title: 'Ventas por período · Marzo 2026', ago: 'Hace 1 semana', size: '3.2 MB' },
          ].map(r => `
            <div style="display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-top: 1px solid var(--border);">
              <div style="width: 36px; height: 36px; border-radius: 8px; background: #FDECEA; color: var(--error); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: 700; font-size: 11px;">PDF</div>
              <div style="flex: 1;">
                <div style="font-weight: 600; font-size: 13px; color: var(--text-primary);">${r.title}</div>
                <div style="font-size: 11.5px; color: var(--text-muted);">${r.ago} · ${r.size}</div>
              </div>
              <button class="btn btn--ghost btn--sm">${Icons.download}</button>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `
  ${renderSidebar('reportes', 'director')}
  <div class="main-area">
    ${renderTopbar({ title: 'Reportes' })}
    ${content()}
  </div>
`;
</script>
</body>
</html>
