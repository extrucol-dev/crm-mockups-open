<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Director · Equipo Comercial</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .ejecutivo-detail-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; cursor: pointer; transition: all 180ms;
  }
  .ejecutivo-detail-card:hover { border-color: var(--primary); box-shadow: var(--shadow-md); }
  .mini-stat { display: flex; flex-direction: column; gap: 2px; }
  .mini-stat__label { font-size: 10px; color: var(--text-disabled); text-transform: uppercase; font-weight: 600; letter-spacing: 0.04em; }
  .mini-stat__value { font-size: 15px; font-weight: 700; color: var(--text-primary); }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
function content() {
  const ejecutivos = [
    { name: 'María García', depto: 'Antioquia', avatar: 'MG', color: 3, ventas: '$ 420 M', meta: '$ 380 M', metaPct: 110, opp: 9, leads: 5, act: 22, comp: 92, tendencia: '▲ +15%' },
    { name: 'Juan Pérez', depto: 'Santander', avatar: 'JP', color: 1, ventas: '$ 385 M', meta: '$ 350 M', metaPct: 110, opp: 12, leads: 8, act: 18, comp: 85, tendencia: '▲ +12%' },
    { name: 'Ana Martínez', depto: 'Valle del Cauca', avatar: 'AM', color: 4, ventas: '$ 260 M', meta: '$ 320 M', metaPct: 81, opp: 11, leads: 7, act: 16, comp: 78, tendencia: '▼ -5%' },
    { name: 'Laura Jiménez', depto: 'Santander', avatar: 'LJ', color: 2, ventas: '$ 215 M', meta: '$ 280 M', metaPct: 77, opp: 8, leads: 6, act: 14, comp: 80, tendencia: '▲ +8%' },
    { name: 'Carlos Rodríguez', depto: 'Cundinamarca', avatar: 'CR', color: 5, ventas: '$ 180 M', meta: '$ 300 M', metaPct: 60, opp: 6, leads: 10, act: 11, comp: 62, tendencia: '▼ -11%' },
    { name: 'Pedro Salazar', depto: 'Atlántico', avatar: 'PS', color: 6, ventas: '$ 95 M', meta: '$ 250 M', metaPct: 38, opp: 5, leads: 4, act: 8, comp: 48, tendencia: '▼ -18%' },
  ];

  const cards = ejecutivos.map(e => {
    const metaColor = e.metaPct >= 100 ? 'var(--success)' : e.metaPct >= 80 ? 'var(--accent)' : 'var(--error)';
    const compColor = e.comp >= 80 ? 'var(--success)' : e.comp >= 60 ? 'var(--accent)' : 'var(--error)';
    const initials = e.name.split(' ').map(n => n[0]).join('').substring(0, 2);
    return `
      <div class="ejecutivo-detail-card" onclick="window.location.href='05-ejecutivo-perfil.html?id=${e.avatar}'">
        <div style="display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px;">
          <div class="avatar avatar--lg avatar--color-${e.color}">${e.avatar}</div>
          <div style="flex: 1;">
            <div style="font-weight: 700; font-size: 15px; color: var(--text-primary);">${e.name}</div>
            <div style="font-size: 12px; color: var(--text-muted);">${e.depto}</div>
            <div style="font-size: 12px; color: ${e.tendencia.includes('▲') ? 'var(--success)' : 'var(--error)'}; margin-top: 2px; font-weight: 600;">${e.tendencia} vs mes anterior</div>
          </div>
          <span class="badge badge--${e.metaPct >= 100 ? 'ganada' : e.metaPct >= 80 ? 'calificacion' : 'perdida'}">
            ${e.metaPct >= 100 ? '✓ Superó meta' : e.metaPct + '% meta'}
          </span>
        </div>

        <div style="padding: 12px; background: var(--page-bg); border-radius: 8px; margin-bottom: 12px;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
            <span style="font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase;">Meta del mes</span>
            <span style="font-size: 12px; color: var(--text-primary); font-weight: 700;">${e.ventas} / ${e.meta}</span>
          </div>
          <div class="progress__bar" style="height: 8px;">
            <div class="progress__fill" style="width: ${Math.min(e.metaPct, 100)}%; background: ${metaColor};"></div>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding-top: 12px; border-top: 1px solid var(--border);">
          <div class="mini-stat"><span class="mini-stat__label">Opp.</span><span class="mini-stat__value">${e.opp}</span></div>
          <div class="mini-stat"><span class="mini-stat__label">Leads</span><span class="mini-stat__value">${e.leads}</span></div>
          <div class="mini-stat"><span class="mini-stat__label">Act.</span><span class="mini-stat__value">${e.act}</span></div>
          <div class="mini-stat"><span class="mini-stat__label">Cumpl.</span><span class="mini-stat__value" style="color: ${compColor};">${e.comp}%</span></div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Equipo comercial</div>
          <div class="page-head__subtitle">6 ejecutivos · 4 regiones · Cumplimiento promedio 74%</div>
        </div>
        <div class="page-head__actions">
          <button class="btn btn--secondary btn--sm">${Icons.download} Exportar</button>
          <button class="btn btn--primary btn--sm">${Icons.chartBar} Comparativo</button>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;">
        <div class="stat-card">
          <div class="stat-card__label">Ventas del equipo</div>
          <div class="stat-card__value stat-card__value--accent">$ 1.555 M</div>
          <div class="stat-card__subtext">Mes actual</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Meta del equipo</div>
          <div class="stat-card__value">$ 1.880 M</div>
          <div class="stat-card__subtext">83% alcanzado</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Sobre meta</div>
          <div class="stat-card__value stat-card__value--success">2</div>
          <div class="stat-card__subtext">De 6 ejecutivos</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Bajo meta</div>
          <div class="stat-card__value" style="color: var(--error);">2</div>
          <div class="stat-card__subtext">Requieren atención</div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;">
        ${cards}
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `
  ${renderSidebar('equipo', 'director')}
  <div class="main-area">
    ${renderTopbar({ title: 'Equipo comercial' })}
    ${content()}
  </div>
`;
</script>
</body>
</html>
