<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SEGUIMIENTO Extrucol · Director · Análisis Leads</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
window.modalRoot = document.getElementById('shell');
function openModal(html) { modalRoot.innerHTML += html; }
function closeModal() {
  const overlays = document.querySelectorAll('.modal-overlay');
  if (overlays.length > 0) overlays[overlays.length - 1].remove();
}

function toggleFiltros() {
  const panel = document.getElementById('filtros-panel');
  panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
}



function content() {
  const leadsByState = [
    { estado: 'Nuevo', count: 6, color: '#3B82F6' },
    { estado: 'Contactado', count: 4, color: '#A855F7' },
    { estado: 'Interesado', count: 3, color: '#22C55E' },
    { estado: 'Descalificado', count: 2, color: '#EF4444' },
  ];

  const leadsByScore = [
    { label: 'Caliente', count: 5, color: '#DC2626' },
    { label: 'Tibio', count: 6, color: '#C7770D' },
    { label: 'Frío', count: 4, color: '#24388C' },
  ];

  const scoreLabel = s => s >= 70 ? 'Caliente' : s >= 30 ? 'Tibio' : 'Frío';
  const scoreColor = s => s >= 70 ? '#DC2626' : s >= 30 ? '#C7770D' : '#24388C';

  const leadsRows = [
    { titulo: 'Suministro anual de tubería', empresa: 'Constructora Bolívar', origen: 'Página Web', score: 100, estado: 'Interesado', asesor: 'Diana', asesorInitials: 'DI', asesorColor: 1 },
    { titulo: 'Proyecto acueducto municipal', empresa: 'Alcaldía de Piedecuesta', origen: 'WhatsApp', score: 80, estado: 'Contactado', asesor: 'Paola', asesorInitials: 'PA', asesorColor: 2 },
    { titulo: 'Consulta portafolio riego', empresa: 'Agroindustria Llanera', origen: 'Página Web', score: 60, estado: 'Nuevo', asesor: 'Diana', asesorInitials: 'DI', asesorColor: 1 },
    { titulo: 'Cotización tubería 315mm', empresa: 'CMM', origen: 'WhatsApp', score: 80, estado: 'Contactado', asesor: 'Alvaro', asesorInitials: 'AL', asesorColor: 3 },
    { titulo: 'Sistema riego tecnificado', empresa: 'Hacienda Valle Verde', origen: 'Instagram', score: 100, estado: 'Interesado', asesor: 'Gonzalo', asesorInitials: 'GO', asesorColor: 4 },
    { titulo: 'Tubería PE para acueducto', empresa: 'Acueductos del Tolima', origen: 'Facebook', score: 20, estado: 'Nuevo', asesor: 'Alexis', asesorInitials: 'AX', asesorColor: 5 },
    { titulo: 'Oferta accesorio PE', empresa: 'MONTAJES JM', origen: 'WhatsApp', score: 60, estado: 'Contactado', asesor: 'Paola', asesorInitials: 'PA', asesorColor: 2 },
    { titulo: 'Cotización manifold', empresa: 'Ingeniería del Occidente', origen: 'Instagram', score: 100, estado: 'Interesado', asesor: 'Diana', asesorInitials: 'DI', asesorColor: 1 },
  ];

  const estadoColors = {
    'Nuevo': 'prospecto',
    'Contactado': 'propuesta',
    'Interesado': 'ganada',
    'Descalificado': 'perdida'
  };

  const stateRows = leadsByState.map(s => `
    <div style="display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border);">
      <span style="width: 10px; height: 10px; border-radius: 50%; background: ${s.color}; flex-shrink: 0;"></span>
      <span style="flex: 1; font-weight: 600; color: var(--text-primary);">${s.estado}</span>
      <span style="font-weight: 700; color: var(--text-primary);">${s.count}</span>
    </div>
  `).join('');

  const leadsByOrigen = [
    { origen: 'WhatsApp', count: 5, color: '#25D366' },
    { origen: 'Página Web', count: 4, color: '#3B82F6' },
    { origen: 'Instagram', count: 3, color: '#E4405F' },
    { origen: 'Facebook', count: 2, color: '#1877F2' },
  ];

  const origenRows = leadsByOrigen.map(o => `
    <div style="display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border);">
      <span style="width: 10px; height: 10px; border-radius: 50%; background: ${o.color}; flex-shrink: 0;"></span>
      <span style="flex: 1; font-weight: 600; color: var(--text-primary);">${o.origen}</span>
      <span style="font-weight: 700; color: var(--text-primary);">${o.count}</span>
    </div>
  `).join('');

  const totalLeads = leadsByState.reduce((a, b) => a + b.count, 0);

  const origenBar = leadsByOrigen.map(o => {
    const pct = (o.count / totalLeads) * 100;
    return `<div style="flex: ${pct}; background: ${o.color}; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 700; min-width: 0; overflow: hidden;">${pct >= 10 ? o.count : ''}</div>`;
  }).join('');

  const leadsListRows = leadsRows.map(l => `
    <tr style="border-bottom: 1px solid var(--border);">
      <td style="padding: 12px 12px; box-sizing: border-box;">
        <a href="../ejecutivo/10-lead-detalle.html" style="text-decoration: none; color: inherit; cursor: pointer;">
          <div style="font-weight: 600; color: var(--text-primary); font-size: 13.5px;">${l.titulo}</div>
          <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">${l.empresa} · ${l.origen}</div>
        </a>
      </td>
      <td style="padding: 12px 12px; box-sizing: border-box;"><span class="badge badge--${estadoColors[l.estado]}">${l.estado}</span></td>
      <td style="padding: 12px 12px; box-sizing: border-box; font-size: 12px; font-weight: 700; color: ${scoreColor(l.score)};">${Icons.fire} ${scoreLabel(l.score)}</td>
      <td style="padding: 12px 12px; box-sizing: border-box;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <div class="avatar avatar--xs avatar--color-${l.asesorColor}">${l.asesorInitials}</div>
          <span style="font-size: 12.5px;">${l.asesor}</span>
        </div>
      </td>
    </tr>
  `).join('');

  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Análisis de Leads</div>
          <div class="page-head__subtitle">Visión consolidada del pipeline de leads del equipo comercial</div>
        </div>
        <div class="page-head__actions">
          <button class="btn btn--secondary btn--sm">${Icons.download} Exportar</button>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;">
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--primary">${Icons.funnel}</div>
          <div class="stat-card__label">Total Leads</div>
          <div class="stat-card__value">${totalLeads}</div>
          <div class="stat-card__subtext">En seguimiento activo</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon" style="color: #DC2626;">${Icons.fire}</div>
          <div class="stat-card__label">Leads Calientes</div>
          <div class="stat-card__value" style="color: #DC2626;">5</div>
          <div class="stat-card__subtext">33% del total</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon" style="color: #C7770D;">${Icons.fire}</div>
          <div class="stat-card__label">Leads Tibios</div>
          <div class="stat-card__value" style="color: #C7770D;">6</div>
          <div class="stat-card__subtext">40% del total</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon" style="color: #24388C;">${Icons.fire}</div>
          <div class="stat-card__label">Leads Fríos</div>
          <div class="stat-card__value" style="color: #24388C;">4</div>
          <div class="stat-card__subtext">27% del total</div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
        <div class="card">
          <div class="card__header">
            <div class="card__title">Leads por estado</div>
          </div>
          <div class="card__body">${stateRows}</div>
        </div>
        <div class="card">
          <div class="card__header">
            <div class="card__title">Leads por origen</div>
          </div>
          <div class="card__body" style="display: grid; grid-template-columns: 140px 1fr; gap: 20px; align-items: center;">
            <div style="position: relative; width: 140px; height: 140px;">
              <svg viewBox="0 0 42 42" style="width: 100%; height: 100%; transform: rotate(-90deg);">
                ${(() => {
                  const total = leadsByOrigen.reduce((a,b) => a + b.count, 0);
                  let offset = 0;
                  return leadsByOrigen.map((o, i) => {
                    const pct = (o.count / total) * 100;
                    const dash = (pct * 100) / 100;
                    const dashOffset = offset;
                    offset += dash;
                    return `<circle cx="21" cy="21" r="15" fill="none" stroke="${o.color}" stroke-width="6" stroke-dasharray="${dash} ${100 - dash}" stroke-dashoffset="${-dashOffset}" />`;
                  }).join('');
                })()}
              </svg>
              <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <span style="font-size: 22px; font-weight: 800; color: var(--text-primary);">${leadsByOrigen.reduce((a,b) => a + b.count, 0)}</span>
                <span style="font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;">Leads</span>
              </div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
              ${leadsByOrigen.map(o => {
                const total = leadsByOrigen.reduce((a,b) => a + b.count, 0);
                const pct = Math.round((o.count / total) * 100);
                return `
                  <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="width: 10px; height: 10px; border-radius: 50%; background: ${o.color}; flex-shrink: 0;"></span>
                    <span style="flex: 1; font-size: 12.5px; font-weight: 600; color: var(--text-primary);">${o.origen}</span>
                    <span style="font-size: 12.5px; font-weight: 700; color: ${o.color};">${pct}%</span>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card__header">
          <div>
            <div class="card__title">Análisis de Leads</div>
            <div class="card__subtitle">${leadsRows.length} leads · vista consolidada del equipo</div>
          </div>
          <div style="display: flex; gap: 6px;">
            <button class="btn btn--secondary btn--sm" onclick="toggleFiltros()">${Icons.filter} Filtros</button>
          </div>
        </div>
        <div id="filtros-panel" style="display: none; margin-bottom: 16px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;">
          <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;">
            <div class="form-field" style="min-width: 160px; margin-bottom: 0;">
              <label class="form-field__label" style="font-size: 11px;">Estado</label>
              <select class="select" style="max-width: 160px;">
                <option>Todos los estados</option>
                <option>Nuevo</option>
                <option>Contactado</option>
                <option>Interesado</option>
                <option>Descalificado</option>
              </select>
            </div>
            <div class="form-field" style="min-width: 160px; margin-bottom: 0;">
              <label class="form-field__label" style="font-size: 11px;">Scoring</label>
              <select class="select" style="max-width: 160px;">
                <option>Todos</option>
                <option>Caliente</option>
                <option>Tibio</option>
                <option>Frío</option>
              </select>
            </div>
            <div class="form-field" style="min-width: 160px; margin-bottom: 0;">
              <label class="form-field__label" style="font-size: 11px;">Asesor</label>
              <select class="select" style="max-width: 160px;">
                <option>Todos</option>
                <option>P. Martínez</option>
                <option>J. Pérez</option>
                <option>C. Gómez</option>
                <option>A. Rojas</option>
              </select>
            </div>
            <div class="form-field" style="min-width: 160px; margin-bottom: 0;">
              <label class="form-field__label" style="font-size: 11px;">Origen</label>
              <select class="select" style="max-width: 160px;">
                <option>Todos</option>
                <option>WhatsApp</option>
                <option>Página Web</option>
                <option>Instagram</option>
              </select>
            </div>
            <button class="btn btn--primary btn--sm">Aplicar</button>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table" style="table-layout: fixed; width: 100%;">
            <thead>
              <tr style="border-bottom: 2px solid var(--border);">
                <th style="width: 260px; text-align: left; padding: 8px 12px; box-sizing: border-box;">Título / Empresa</th>
                <th style="width: 100px; text-align: left; padding: 8px 12px; box-sizing: border-box;">Estado</th>
                <th style="width: 80px; text-align: left; padding: 8px 12px; box-sizing: border-box;">Scoring</th>
                <th style="width: 130px; text-align: left; padding: 8px 12px; box-sizing: border-box;">Asesor</th>
              </tr>
            </thead>
            <tbody>
              ${leadsListRows}
            </tbody>
          </table>
        </div>
        <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; margin-top: 8px;">
          <span style="font-size: 12px; color: var(--text-muted);">Mostrando 1-8 de 8 resultados</span>
          <div style="display: flex; gap: 4px;">
            <button class="btn btn--ghost btn--sm" disabled style="opacity: 0.4;">${Icons.chevronLeft}</button>
            <button class="btn btn--primary btn--sm" style="min-width: 32px;">1</button>
            <button class="btn btn--ghost btn--sm" disabled style="opacity: 0.4;">${Icons.chevronRight}</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `
  ${renderSidebar('leads', 'director')}
  <div class="main-area">
    ${renderTopbar({ title: 'Análisis de Leads' })}
    ${content()}
  </div>
`;
</script>
</body>
</html>
