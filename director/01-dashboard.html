<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Director · Dashboard Ejecutivo</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 180px; padding: 0 8px; }
  .chart-bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0; }
  .chart-bar-wrap { width: 100%; display: flex; gap: 3px; align-items: flex-end; height: 100%; }
  .chart-bar { flex: 1; border-radius: 4px 4px 0 0; min-width: 8px; background: var(--primary); transition: all 200ms; }
  .chart-bar--light { background: var(--primary-bg); }
  .chart-bar-label { font-size: 10.5px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }

  .donut {
    width: 180px; height: 180px; border-radius: 50%;
    background: conic-gradient(
      var(--primary) 0 30%,
      var(--accent) 30% 52%,
      #A855F7 52% 70%,
      var(--green-bright) 70% 85%,
      var(--error) 85% 100%
    );
    position: relative; flex-shrink: 0;
  }
  .donut::before { content: ''; position: absolute; inset: 30px; background: var(--surface); border-radius: 50%; }
  .donut__center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; }
  .donut__value { font-size: 22px; font-weight: 800; color: var(--text-primary); }
  .donut__label { font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }

  .legend-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 12.5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  .funnel-stage { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
  .funnel-bar-container { flex: 1; display: flex; justify-content: center; }
  .funnel-bar {
    height: 34px; background: var(--primary); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 13px;
  }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
function content() {
  const statCards = `
    <div class="stat-card">
      <div class="stat-card__icon stat-card__icon--accent">${Icons.currency}</div>
      <div class="stat-card__label">Pipeline total</div>
      <div class="stat-card__value stat-card__value--accent">$ 1.226 M</div>
      <div class="stat-card__subtext"><span class="stat-card__trend stat-card__trend--up">+15%</span> vs mes anterior</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon stat-card__icon--success">${Icons.trophy}</div>
      <div class="stat-card__label">Ventas del mes</div>
      <div class="stat-card__value stat-card__value--success">$ 26 M</div>
      <div class="stat-card__subtext"><span class="stat-card__trend stat-card__trend--up">+1</span> 1 oportunidad ganada</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon">${Icons.chartPie}</div>
      <div class="stat-card__label">Tasa conversión</div>
      <div class="stat-card__value">8%</div>
      <div class="stat-card__subtext"><span class="stat-card__trend stat-card__trend--down">-3%</span> Leads → Ganadas</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon stat-card__icon--green">${Icons.users}</div>
      <div class="stat-card__label">Clientes nuevos</div>
      <div class="stat-card__value stat-card__value--green">2</div>
      <div class="stat-card__subtext">Este mes · monto ≥ $10M</div>
    </div>
  `;

  const meses = ['Oct','Nov','Dic','Ene','Feb','Mar','Abr'];
  const valores = [65,72,58,85,70,92,78];
  const chartHTML = valores.map((v, i) => `
    <div class="chart-bar-group">
      <div class="chart-bar-wrap">
        <div class="chart-bar" style="height: ${v}%"></div>
        <div class="chart-bar chart-bar--light" style="height: ${v * 0.7}%"></div>
      </div>
      <span class="chart-bar-label">${meses[i]}</span>
    </div>
  `).join('');

  const stages = [
    { label: 'Leads generados', count: 240, pct: 100 },
    { label: 'Contactados', count: 168, pct: 70 },
    { label: 'Interesados', count: 108, pct: 45 },
    { label: 'Trasladados a distribuidor', count: 76, pct: 32 },
    { label: 'En propuesta', count: 52, pct: 22 },
    { label: 'Ganadas', count: 32, pct: 13 },
  ];
  const funnelHTML = stages.map(s => `
    <div class="funnel-stage">
      <div style="min-width: 140px; font-size: 12.5px; color: var(--text-secondary); font-weight: 600;">${s.label}</div>
      <div class="funnel-bar-container">
        <div class="funnel-bar" style="width: ${s.pct}%;">${s.count}</div>
      </div>
      <div style="min-width: 50px; text-align: right; font-size: 12px; color: var(--text-muted); font-weight: 600;">${s.pct}%</div>
    </div>
  `).join('');

  const ranking = [
    { pos: 1, name: 'Diana', ventas: '$ 574 M', opp: 8, avatar: 'DI', color: 3, trend: 'up', pct: 18 },
    { pos: 2, name: 'Paola', ventas: '$ 393 M', opp: 6, avatar: 'PA', color: 1, trend: 'up', pct: 12 },
    { pos: 3, name: 'Alvaro', ventas: '$ 187 M', opp: 5, avatar: 'AL', color: 4, trend: 'down', pct: 5 },
    { pos: 4, name: 'Gonzalo', ventas: '$ 44 M', opp: 3, avatar: 'GO', color: 2, trend: 'up', pct: 8 },
    { pos: 5, name: 'Alexis', ventas: '$ 28 M', opp: 4, avatar: 'AX', color: 5, trend: 'down', pct: 11 },
  ];

  const rankingHTML = ranking.map(r => `
    <div style="display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border);">
      <div style="width: 28px; text-align: center; font-weight: 800; font-size: 14px; color: ${r.pos <= 3 ? 'var(--accent)' : 'var(--text-muted)'};">
        ${r.pos === 1 ? '🥇' : r.pos === 2 ? '🥈' : r.pos === 3 ? '🥉' : r.pos}
      </div>
      <div class="avatar avatar--sm avatar--color-${r.color}">${r.avatar}</div>
      <div style="flex: 1;">
        <div style="font-weight: 600; font-size: 13px; color: var(--text-primary);">${r.name}</div>
        <div style="font-size: 11.5px; color: var(--text-muted);">${r.opp} oportunidades</div>
      </div>
      <div style="text-align: right;">
        <div style="font-weight: 700; font-size: 13.5px; color: var(--accent);">${r.ventas}</div>
        <div style="font-size: 11px; color: var(--${r.trend === 'up' ? 'success' : 'error'});">
          ${r.trend === 'up' ? '▲' : '▼'} ${r.trend === 'up' ? '+' : '-'}${r.pct}%
        </div>
      </div>
    </div>
  `).join('');

  const sectoresHTML = `
    <div style="display: flex; align-items: center; gap: 20px;">
      <div class="donut">
        <div class="donut__center">
          <div class="donut__value">$ 1.2B</div>
          <div class="donut__label">Pipeline</div>
        </div>
      </div>
      <div style="flex: 1; min-width: 0;">
        ${[
          { label: 'Agua Potable', color: 'var(--primary)', val: '$ 490 M', pct: '40%' },
          { label: 'Agro / Riego', color: 'var(--accent)', val: '$ 368 M', pct: '30%' },
          { label: 'Construcción', color: '#A855F7', val: '$ 245 M', pct: '20%' },
          { label: 'Gas', color: 'var(--green-bright)', val: '$ 123 M', pct: '10%' },
        ].map(s => `
          <div class="legend-item">
            <span class="legend-dot" style="background: ${s.color};"></span>
            <span style="flex:1;">${s.label}</span>
            <strong>${s.val}</strong>
            <span style="color: var(--text-muted); min-width: 36px; text-align: right;">${s.pct}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  const motivosHTML = [
    { motivo: 'Precio no competitivo', count: 8, pct: 32 },
    { motivo: 'Tiempo de entrega', count: 6, pct: 24 },
    { motivo: 'Competencia ganó', count: 5, pct: 20 },
    { motivo: 'Cliente canceló', count: 4, pct: 16 },
    { motivo: 'Otros', count: 2, pct: 8 },
  ].map(m => `
    <div style="padding: 8px 0;">
      <div style="display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 4px;">
        <span style="color: var(--text-secondary);">${m.motivo}</span>
        <span style="color: var(--text-primary); font-weight: 700;">${m.count} <span style="color: var(--text-muted); font-weight: 400;">(${m.pct}%)</span></span>
      </div>
      <div class="progress__bar"><div class="progress__fill" style="width: ${m.pct * 3}%; background: var(--error);"></div></div>
    </div>
  `).join('');

  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Dash board Ejecutivo</div>
          <div class="page-head__subtitle">Visión estratégica del negocio · Actualizado hace 5 min</div>
        </div>
        <div class="page-head__actions">
          <select class="select" style="max-width: 160px;">
            <option>Abril 2026</option><option>Marzo 2026</option><option>Q1 2026</option><option>Año 2026</option>
          </select>
          <button class="btn btn--secondary btn--sm">${Icons.download} Exportar PDF</button>
          <a href="06-reportes.html" style="text-decoration: none; color: inherit; font: inherit; cursor: pointer;"><button class="btn btn--primary btn--sm">${Icons.chartBar} Reportes</button></a>
          
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;">
        ${statCards}
      </div>

      <div style="display: grid; gap: 16px; margin-bottom: 16px; grid-template-columns: 1.5fr 1fr;">
        <div class="card">
          <div class="card__header">
            <div><div class="card__title">Ventas mensuales</div><div class="card__subtitle">Últimos 7 meses · millones COP</div></div>
            <div style="display: flex; gap: 12px; font-size: 12px;">
              <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; background: var(--primary); border-radius: 2px;"></span> Ventas</span>
              <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; background: var(--primary-bg); border-radius: 2px;"></span> Meta</span>
            </div>
          </div>
          <div class="card__body">
            <div class="chart-bars">${chartHTML}</div>
            <div style="display: flex; justify-content: space-between; padding-top: 14px; border-top: 1px solid var(--border); margin-top: 12px;">
              <div>
                <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Promedio mensual</div>
                <div style="font-size: 18px; font-weight: 800; color: var(--text-primary);">$ 917 M</div>
              </div>
              <div style="text-align: right;">
                <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Mejor mes</div>
                <div style="font-size: 18px; font-weight: 800; color: var(--success);">$ 1.080 M</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card__header"><div><div class="card__title">Pipeline por sector</div><div class="card__subtitle">Distribución del valor total</div></div></div>
          <div class="card__body">${sectoresHTML}</div>
        </div>
      </div>

      <div style="display: grid; gap: 16px; margin-bottom: 16px; grid-template-columns: 1.3fr 1fr;">
        <div class="card">
          <div class="card__header">
            <div><div class="card__title">Funnel de conversión</div><div class="card__subtitle">Lead → Ganada · últimos 90 días</div></div>
            <span class="badge badge--info">Tasa global 13%</span>
          </div>
          <div class="card__body">${funnelHTML}</div>
        </div>
        <div class="card">
          <div class="card__header">
            <div><div class="card__title">Ranking ejecutivos</div><div class="card__subtitle">Top 5 ventas del mes</div></div>
            <a href="05-equipo-comercial.html" style="text-decoration: none; color: inherit;"><button class="btn btn--ghost btn--sm">Ver todos</button></a>
          </div>
          <div class="card__body" style="padding-top: 0; padding-bottom: 0;">${rankingHTML}</div>
        </div>
      </div>

      <div style="display: grid; gap: 16px; grid-template-columns: 1fr 1fr;">
        <div class="card">
          <div class="card__header"><div><div class="card__title">Proyección Q2 2026</div><div class="card__subtitle">Forecasting · probabilidad ponderada</div></div></div>
          <div class="card__body">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center;">
              <div style="padding: 14px; border: 1px solid var(--border); border-radius: 8px;">
                <div style="font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase;">Mayo</div>
                <div style="font-size: 20px; font-weight: 800; color: var(--primary); margin-top: 6px;">$ 1.1 B</div>
                <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">Prob. 72%</div>
              </div>
              <div style="padding: 14px; border: 1px solid var(--primary); border-radius: 8px; background: var(--primary-bg);">
                <div style="font-size: 11px; color: var(--primary); font-weight: 600; text-transform: uppercase;">Junio ★</div>
                <div style="font-size: 20px; font-weight: 800; color: var(--primary); margin-top: 6px;">$ 1.4 B</div>
                <div style="font-size: 11px; color: var(--primary); margin-top: 4px;">Prob. 68%</div>
              </div>
              <div style="padding: 14px; border: 1px solid var(--border); border-radius: 8px;">
                <div style="font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase;">Julio</div>
                <div style="font-size: 20px; font-weight: 800; color: var(--primary); margin-top: 6px;">$ 890 M</div>
                <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">Prob. 54%</div>
              </div>
            </div>
            <div style="margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
              <div>
                <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Total Q2</div>
                <div style="font-size: 22px; font-weight: 800; color: var(--accent);">$ 3.390 M</div>
              </div>
              <a href="04-forecasting.html" style="text-decoration: none; color: inherit;"><button class="btn btn--ghost btn--sm">${Icons.chartBar} Detalle</button></a>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card__header"><div><div class="card__title">Motivos de pérdida</div><div class="card__subtitle">Últimos 90 días · 25 opp. perdidas</div></div></div>
          <div class="card__body">${motivosHTML}</div>
        </div>
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `
  ${renderSidebar('dashboard', 'director')}
  <div class="main-area">
    ${renderTopbar({ title: 'Dashboard Ejecutivo' })}
    ${content()}
  </div>
`;
</script>
</body>
</html>
