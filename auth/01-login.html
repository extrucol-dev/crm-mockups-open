<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Auth · Login</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 24px; }
  .canvas-section-title { font: 700 15px 'Roboto'; color: #24388C; margin: 40px 0 20px; padding: 8px 14px; background: #fff; border: 1px solid #E5E5E5; border-radius: 6px; display: inline-block; }


  .login-layout { display: grid; grid-template-columns: 1fr 1fr; min-height: 100%; }
  .login-left {
    background: var(--primary); position: relative; overflow: hidden;
    padding: 48px 40px; color: #fff; display: flex; flex-direction: column;
  }
  .login-left::before {
    content: ''; position: absolute; top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(243, 150, 16, 0.35) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none;
  }
  .login-left::after {
    content: ''; position: absolute; bottom: -200px; left: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, transparent 60%);
    border-radius: 50%; pointer-events: none;
  }
  .login-left__logo { font-size: 17px; font-weight: 800; letter-spacing: -0.01em; display: flex; gap: 2px; position: relative; }
  .login-left__logo span { color: var(--accent); }
  .login-left__tagline { font-size: 11.5px; color: rgba(255,255,255,0.4); margin-top: 2px; letter-spacing: 0.02em; position: relative; }
  .login-left__hero { margin-top: auto; margin-bottom: 40px; position: relative; }
  .login-left__title { font-size: 32px; font-weight: 800; letter-spacing: -0.04em; line-height: 1.15; margin-bottom: 12px; }
  .login-left__title .accent { color: var(--accent); }
  .login-left__subtitle { font-size: 15px; color: rgba(255,255,255,0.6); max-width: 400px; line-height: 1.55; }
  .login-features { display: flex; flex-direction: column; gap: 16px; position: relative; }
  .login-feature { display: flex; align-items: center; gap: 14px; }
  .login-feature__icon {
    width: 40px; height: 40px; background: rgba(255,255,255,0.10);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    color: var(--accent); flex-shrink: 0;
  }
  .login-feature__text { font-size: 14px; color: rgba(255,255,255,0.75); }

  .login-right {
    background: #fff; padding: 60px 40px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .login-form { width: 100%; max-width: 380px; }
  .login-form__icon {
    width: 44px; height: 44px; background: var(--primary-bg); color: var(--primary);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .login-form__title { font-size: 24px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.03em; margin-bottom: 6px; }
  .login-form__subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
  .login-form__fields { display: flex; flex-direction: column; gap: 16px; }
  .login-form__forgot { text-align: right; font-size: 12.5px; font-weight: 600; color: var(--primary); cursor: pointer; margin-top: -8px; }
  .login-divider {
    display: flex; align-items: center; gap: 12px; margin: 20px 0;
    color: var(--text-disabled); font-size: 12px;
  }
  .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .login-google {
    width: 100%; padding: 10px; border: 1px solid var(--border-input);
    border-radius: 6px; background: #fff;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    cursor: pointer; transition: background 180ms;
  }
  .login-google:hover { background: var(--page-bg); }
  .login-footer { text-align: center; margin-top: 28px; font-size: 11.5px; color: var(--text-disabled); }

  .is-compact .login-layout { grid-template-columns: 1fr; }
  .is-compact .login-left { padding: 32px 24px; min-height: 220px; }
  .is-compact .login-left__hero { margin-top: 24px; margin-bottom: 24px; }
  .is-compact .login-left__title { font-size: 26px; }
  .is-compact .login-features { display: none; }
  .is-compact .login-right { padding: 32px 24px; }
  .is-mobile-login .login-left__title { font-size: 22px; line-height: 1.2; }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
document.getElementById('shell').innerHTML = `<div class="login-layout">${renderLeft()}${renderRight('login')}</div>`;
</script>
</body>
</html>
