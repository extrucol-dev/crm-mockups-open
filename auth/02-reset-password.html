<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Auth · Reset Password</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .reset-layout { min-height: 100%; background: var(--page-bg); display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .reset-card {
    max-width: 440px; width: 100%;
    background: #fff; border: 1px solid var(--border);
    border-radius: 12px; padding: 40px;
    box-shadow: 0 10px 30px rgba(36, 56, 140, 0.08);
  }
  .reset-logo { text-align: center; font-size: 15px; font-weight: 800; color: var(--primary); margin-bottom: 24px; }
  .reset-logo span { color: var(--accent); }

  .reset-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--primary-bg); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  .reset-icon--success { background: #E8F5EE; color: var(--success); }
  .reset-icon--accent { background: var(--accent-bg); color: var(--accent); }

  .reset-title { font-size: 22px; font-weight: 800; color: var(--text-primary); text-align: center; letter-spacing: -0.02em; margin-bottom: 8px; }
  .reset-subtitle { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 28px; line-height: 1.5; }

  .password-strength { display: flex; gap: 4px; margin-top: 6px; }
  .strength-bar { height: 3px; flex: 1; background: var(--border); border-radius: 2px; transition: all 200ms; }
  .strength-bar.is-active { background: var(--success); }
  .strength-bar.is-weak { background: var(--error); }
  .strength-bar.is-medium { background: var(--accent); }

  .check-item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; padding: 3px 0; }
  .check-item.is-valid { color: var(--success); }
  .check-item.is-invalid { color: var(--text-muted); }
  .check-item__dot {
    width: 14px; height: 14px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px;
  }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
document.getElementById('shell').innerHTML = `
  <div class="reset-layout">
    <div class="reset-card">
      <div class="reset-logo">CRM <span>Extrucol</span></div>

      <div class="reset-icon">${Icons.lock}</div>
      <div class="reset-title">Nueva contraseña</div>
      <div class="reset-subtitle">Ingresa tu nueva contraseña. Debe cumplir con los requisitos de seguridad.</div>

      <div style="display: flex; flex-direction: column; gap: 14px;">
        <div class="form-field">
          <label class="form-field__label">Nueva contraseña</label>
          <div class="input-wrapper">
            ${Icons.lock}
            <input class="input input--with-icon" type="password" value="Password2026!">
          </div>
          <div class="password-strength">
            <div class="strength-bar is-active"></div>
            <div class="strength-bar is-active"></div>
            <div class="strength-bar is-active"></div>
            <div class="strength-bar is-active"></div>
          </div>
          <div style="font-size: 11.5px; color: var(--success); font-weight: 600; margin-top: 4px;">✓ Contraseña fuerte</div>
        </div>

        <div class="form-field">
          <label class="form-field__label">Confirmar contraseña</label>
          <div class="input-wrapper">
            ${Icons.lock}
            <input class="input input--with-icon" type="password" value="Password2026!">
          </div>
        </div>

        <div style="background: var(--page-bg); padding: 12px; border-radius: 6px;">
          <div style="font-size: 11.5px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.04em; margin-bottom: 8px;">Requisitos</div>
          <div class="check-item is-valid">
            <span class="check-item__dot" style="background: var(--success); color: #fff;">✓</span>
            Mínimo 8 caracteres
          </div>
          <div class="check-item is-valid">
            <span class="check-item__dot" style="background: var(--success); color: #fff;">✓</span>
            Al menos una mayúscula
          </div>
          <div class="check-item is-valid">
            <span class="check-item__dot" style="background: var(--success); color: #fff;">✓</span>
            Al menos un número
          </div>
          <div class="check-item is-valid">
            <span class="check-item__dot" style="background: var(--success); color: #fff;">✓</span>
            Al menos un carácter especial
          </div>
        </div>

        <button class="btn btn--primary btn--block btn--lg" style="margin-top: 8px;">
          ${Icons.check} Restablecer contraseña
        </button>
      </div>

      <div style="text-align: center; margin-top: 24px;">
        <a style="font-size: 12.5px; color: var(--primary); font-weight: 600; cursor: pointer;">
          ← Volver al login
        </a>
      </div>
    </div>
  </div>
`;
</script>
</body>
</html>
