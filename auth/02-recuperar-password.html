<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Auth · Recuperar Contraseña</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 24px; }
  .canvas-section-title { font: 700 15px 'Roboto'; color: #24388C; margin: 40px 0 20px; padding: 8px 14px; background: #fff; border: 1px solid #E5E5E5; border-radius: 6px; display: inline-block; }


  .auth-screen {
    min-height: 100%; padding: 40px 24px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #F7F7F7 0%, #EEF1FA 100%);
    position: relative;
    overflow: hidden;
  }
  .auth-screen::before {
    content: ''; position: absolute;
    top: -150px; right: -150px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(243,150,16,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .auth-screen::after {
    content: ''; position: absolute;
    bottom: -100px; left: -100px;
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(36,56,140,0.10) 0%, transparent 60%);
    pointer-events: none;
  }

  .auth-card {
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    padding: 40px;
    max-width: 440px;
    width: 100%;
    position: relative;
    z-index: 2;
  }
  .auth-brand {
    font-size: 15px; font-weight: 800; color: var(--primary);
    text-align: center; margin-bottom: 24px;
  }
  .auth-brand span { color: var(--accent); }

  .auth-icon {
    width: 56px; height: 56px; border-radius: 16px;
    background: var(--primary-bg); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  .auth-icon svg { width: 28px; height: 28px; }
  .auth-icon--success { background: var(--success-bg); color: var(--success); }
  .auth-icon--email { background: var(--accent-bg); color: var(--accent); }

  .auth-title {
    font-size: 24px; font-weight: 800; letter-spacing: -0.03em;
    text-align: center; margin-bottom: 8px;
  }
  .auth-subtitle {
    font-size: 14px; color: var(--text-muted); text-align: center;
    margin-bottom: 28px; line-height: 1.5;
  }

  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-muted); font-weight: 500;
    margin-top: 20px; cursor: pointer;
  }
  .back-link:hover { color: var(--primary); }

  .password-strength {
    display: flex; gap: 4px; margin-top: 6px;
  }
  .password-strength__bar {
    height: 4px; flex: 1; border-radius: 2px; background: var(--border);
  }
  .password-strength__bar.is-active { background: var(--accent); }
  .password-strength__bar.is-strong { background: var(--success); }

  .password-requirements {
    margin-top: 10px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .password-req {
    font-size: 11.5px; color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
  }
  .password-req.is-met { color: var(--success); }
  .password-req__check {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--border); color: transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700;
  }
  .password-req.is-met .password-req__check { background: var(--success); color: #fff; }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
document.getElementById('shell').innerHTML = forgotHTML();
</script>
</body>
</html>
