<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Cierre Oportunidad</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 24px; }
  .canvas-section-title { font: 700 15px 'Roboto'; color: #24388C; margin: 40px 0 20px; padding: 8px 14px; background: #fff; border: 1px solid #E5E5E5; border-radius: 6px; display: inline-block; }

  .modal-overlay {
    position: absolute; inset: 0;
    background: rgba(26,26,26,0.5);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 60px 24px; z-index: 100;
  }
  .modal-content {
    background: var(--surface); border-radius: 12px;
    max-width: 520px; width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden;
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .modal-header__icon--error {
    width: 44px; height: 44px; background: var(--error-bg); color: var(--error);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
  }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 10px; background: var(--page-bg);
  }

  .motivo-option {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer;
    transition: all 180ms;
    margin-bottom: 8px;
  }
  .motivo-option:hover { border-color: var(--primary); background: var(--primary-bg); }
  .motivo-option.is-selected { border-color: var(--error); background: var(--error-bg); }
  .motivo-option__radio {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--border-input);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .motivo-option.is-selected .motivo-option__radio {
    border-color: var(--error);
  }
  .motivo-option.is-selected .motivo-option__radio::after {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: var(--error);
  }

  .confetti {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 99;
  }
  .confetti::before, .confetti::after {
    content: '🎉';
    position: absolute;
    font-size: 32px;
    animation: float 3s ease-in-out infinite;
  }
  .confetti::before { top: 40px; left: 30%; }
  .confetti::after { top: 100px; right: 28%; animation-delay: 0.5s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-15px) rotate(10deg); }
  }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>
  </div>
</div>

<script src="../shared/components.js"></script>
<script>
function lostModal() {
  return `
    ${renderSidebar('oportunidades','ejecutivo')}
    <div class="main-area">
      ${renderTopbar({breadcrumb:['Oportunidades','Detalle']})}
      <div class="content"></div>
    </div>
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-header__icon--error">${Icons.xCircle}</div>
          <div>
            <div style="font-weight: 700; font-size: 18px;">Cerrar como Perdida</div>
            <div style="font-size: 12.5px; color: var(--text-muted);">El motivo nos ayuda a mejorar</div>
          </div>
        </div>
        <div class="modal-body">
          <div style="padding: 14px; background: var(--error-bg); border-radius: 8px; margin-bottom: 16px;">
            <div style="font-size: 11.5px; color: var(--error); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px;">Oportunidad</div>
            <div style="font-weight: 700; color: var(--text-primary);">Licitación municipal acueducto</div>
            <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">Municipio de X · Valor: $ 65.000.000</div>
          </div>

          <div style="font-size: 12.5px; font-weight: 600; color: var(--text-primary); margin-bottom: 10px;">Motivo de pérdida <span style="color: var(--error);">*</span></div>

          <div class="motivo-option">
            <div class="motivo-option__radio"></div>
            <div>
              <div style="font-weight: 600; font-size: 13.5px;">Precio no competitivo</div>
              <div style="font-size: 11.5px; color: var(--text-muted);">Cliente encontró mejor precio en competencia</div>
            </div>
          </div>
          <div class="motivo-option is-selected">
            <div class="motivo-option__radio"></div>
            <div>
              <div style="font-weight: 600; font-size: 13.5px;">Competencia ganó licitação</div>
              <div style="font-size: 11.5px; color: var(--text-muted);">Otro proveedor fue adjudicado</div>
            </div>
          </div>
          <div class="motivo-option">
            <div class="motivo-option__radio"></div>
            <div>
              <div style="font-weight: 600; font-size: 13.5px;">Cliente pospuso decisión</div>
              <div style="font-size: 11.5px; color: var(--text-muted);">Projeto aplazado indefinidamente</div>
            </div>
          </div>
          <div class="motivo-option">
            <div class="motivo-option__radio"></div>
            <div>
              <div style="font-weight: 600; font-size: 13.5px;">Requerimientos técnicos no coinciden</div>
              <div style="font-size: 11.5px; color: var(--text-muted);">No tenemos producto para esta necesidad</div>
            </div>
          </div>
          <div class="motivo-option">
            <div class="motivo-option__radio"></div>
            <div>
              <div style="font-weight: 600; font-size: 13.5px;">Otro motivo</div>
              <div style="font-size: 11.5px; color: var(--text-muted);">Especificar en observaciones</div>
            </div>
          </div>

          <div class="form-field" style="margin: 16px 0;">
            <label class="form-field__label">Observaciones detalladas <span class="req">*</span></label>
            <textarea class="textarea" rows="3" placeholder="Explica qué sucedió para poder aprender...">La competencia (AguaPlast) ofreció un precio 12% menor con tiempos de entrega similares. Cliente priorizó costo sobre trayectoria.</textarea>
          </div>

          <div class="alert alert--info">
            ${Icons.chartBar}
            <div style="font-size: 12px;">Los motivos de pérdida se analizan en los reportes del director para mejorar la estrategia comercial.</div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn--secondary">Cancelar</button>
          <button class="btn btn--danger">${Icons.xCircle} Confirmar cierre perdido</button>
        </div>
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `<div class="app-shell">${lostModal()}</div>`;
</script>
</body>
</html>
