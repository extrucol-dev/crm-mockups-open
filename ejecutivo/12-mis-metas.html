<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Mis Metas</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 40px; }

  .goal-hero {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff;
    border-radius: 16px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }
  .goal-hero::before {
    content: '';
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(243, 150, 16, 0.25) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .hero-ring {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0 90%, rgba(255,255,255,0.15) 90%);
    position: relative;
    flex-shrink: 0;
  }
  .hero-ring::before {
    content: ''; position: absolute; inset: 10px;
    background: var(--primary-dark);
    border-radius: 50%;
  }
  .hero-ring__inner {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1;
  }
  .hero-ring__value { font-size: 40px; font-weight: 800; letter-spacing: -0.02em; }
  .hero-ring__label { font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }

  .meta-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 180ms;
    position: relative;
    overflow: hidden;
  }
  .meta-card:hover { box-shadow: var(--shadow-md); }
  .meta-card__stripe {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
  }
  .meta-card__header {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .meta-card__icon {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .meta-card__title {
    font-size: 14px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 2px;
  }
  .meta-card__desc {
    font-size: 11.5px; color: var(--text-muted);
  }
  .meta-card__progress-row {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 6px;
  }
  .meta-current { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .meta-target {
    font-size: 12px; color: var(--text-muted);
    font-weight: 500;
  }
  .meta-pct {
    font-size: 13px; font-weight: 700;
  }
  .meta-bar {
    height: 8px; background: var(--page-bg);
    border-radius: 4px; overflow: hidden;
    margin-bottom: 10px;
  }
  .meta-bar__fill {
    height: 100%; border-radius: 4px;
    transition: width 400ms ease;
  }

  .week-chart {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 4px;
    padding: 16px 0;
  }
  .week-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .week-bar {
    width: 100%; background: var(--page-bg);
    border-radius: 3px; position: relative;
    height: 80px;
    overflow: hidden;
  }
  .week-bar__fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--primary); border-radius: 3px;
  }
  .week-bar__target {
    position: absolute; left: 0; right: 0;
    border-top: 2px dashed var(--accent);
  }
  .week-label {
    font-size: 10px; color: var(--text-muted);
    font-weight: 600;
  }

  .achievement-card {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
  }
  .achievement-card__icon {
    width: 40px; height: 40px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .achievement-card--unlocked {
    background: #FFF9EC;
    border-color: #F5D98C;
  }
  .achievement-card--locked {
    opacity: 0.55;
  }
  .modal-overlay {
    position: absolute; inset: 0;
    background: rgba(26,26,26,0.5);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 60px 24px; z-index: 100;
  }
  .modal-content {
    background: var(--surface); border-radius: 12px;
    max-width: 580px; width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden;
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .modal-header > :first-child { flex-shrink: 0; }
  .modal-header > :not(:first-child):not(:last-child) { flex: 1; }
  .modal-header__icon { background: var(--primary-bg); color: var(--primary); }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 10px; background: var(--page-bg);
  }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
window.modalRoot = document.getElementById('shell');
function openModal(html) { modalRoot.innerHTML += html; }
function closeModal() {
  const overlays = document.querySelectorAll('.modal-overlay');
  if (overlays.length > 0) overlays[overlays.length - 1].remove();
}

function content() {
  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Mis metas</div>
          <div class="page-head__subtitle">Abril 2026 · Faltan <strong style="color: var(--accent);">12 días</strong> para el cierre del mes</div>
        </div>
        <div class="page-head__actions">
          <select class="select" style="max-width: 160px;">
            <option>Abril 2026</option>
            <option>Q2 2026</option>
            <option>Año 2026</option>
            <option>Histórico</option>
          </select>
          <a href="07-actividades.html" style="text-decoration: none;"><button class="btn btn--secondary btn--sm">${Icons.clock} Historial</button></a>
        </div>
      </div>

      <div class="goal-hero" style="margin-bottom: 20px;">
        <div style="display: flex; align-items: center; gap: 32px; position: relative;">
          <div class="hero-ring">
            <div class="hero-ring__inner">
              <div class="hero-ring__value">90%</div>
              <div class="hero-ring__label">Completado</div>
            </div>
          </div>
          <div style="flex: 1;">
            <div style="font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.7; margin-bottom: 6px;">Progreso global del mes</div>
            <div style="font-size: 28px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 10px;">
              ¡Buen ritmo, Juan! <span style="color: var(--accent);">Vas en buen camino</span>
            </div>
            <div style="font-size: 15px; opacity: 0.85; max-width: 560px; line-height: 1.5;">
              Has completado el 90% de tus metas del sistema este mes. Si mantienes este ritmo, cerrarás con cumplimiento completo.
              Cierra las 2 oportunidades pendientes para superar la meta de ventas.
            </div>
            <div style="display: flex; gap: 12px; margin-top: 16px;">
              <div style="padding: 10px 16px; background: rgba(255,255,255,0.1); border-radius: 8px; display: flex; flex-direction: column;">
                <span style="font-size: 11px; opacity: 0.7; text-transform: uppercase; font-weight: 600;">Ranking equipo</span>
                <span style="font-size: 18px; font-weight: 800;">🥈 2° de 6</span>
              </div>
              <div style="padding: 10px 16px; background: rgba(255,255,255,0.1); border-radius: 8px; display: flex; flex-direction: column;">

                <span style="font-size: 11px; opacity: 0.7; text-transform: uppercase; font-weight: 600;">Proyección mes</span>
                <span style="font-size: 18px; font-weight: 800;">$ 311 M <span style="font-size: 12px; opacity: 0.7;">(89%)</span></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div style="margin-bottom: 14px;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
          <div>
            <div style="font-size: 15px; font-weight: 700; color: var(--text-primary);">Metas del mes</div>
            <div style="font-size: 12px; color: var(--text-muted);">Metas del sistema asignadas este mes</div>
          </div>
          <div style="display: flex; gap: 6px;">
            <button class="btn btn--ghost btn--sm" style="background: var(--primary-bg); color: var(--primary);">Todas (3)</button>
          </div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px;">
        <div class="meta-card">
          <div class="meta-card__stripe" style="background: var(--success);"></div>
          <div class="meta-card__header">
            <div class="meta-card__icon" style="background: #E8F5EE; color: var(--success);">${Icons.currency}</div>
            <span class="badge badge--info" style="font-size: 10px;">Del sistema</span>
          </div>
          <div class="meta-card__title">Ventas del mes</div>
          <div class="meta-card__desc">Oportunidades ganadas · Valor total cerrado</div>
          <div style="margin-top: 14px;">
            <div class="meta-card__progress-row">
              <div>
                <span class="meta-current" style="color: var(--success);">$ 285 M</span>
                <span class="meta-target">/ $ 350 M</span>
              </div>
              <span class="meta-pct" style="color: var(--success);">81%</span>
            </div>
            <div class="meta-bar">
              <div class="meta-bar__fill" style="width: 81%; background: var(--success);"></div>

            <div style="font-size: 11.5px; color: var(--text-muted);">
              Faltan <strong style="color: var(--text-primary);">$ 65 M</strong> en 12 días · Proyección: <strong style="color: var(--success);">$ 408 M (117%)</strong>
            </div>
          </div>
        </div>

        <div class="meta-card">
          <div class="meta-card__stripe" style="background: var(--primary);"></div>
          <div class="meta-card__header">
            <div class="meta-card__icon" style="background: var(--primary-bg); color: var(--primary);">${Icons.briefcase}</div>
            <span class="badge badge--info" style="font-size: 10px;">Del sistema</span>
          </div>

            </div>
            <div class="meta-bar">

        </div>

        <div class="meta-card">
          <div class="meta-card__stripe" style="background: var(--accent);"></div>
          <div class="meta-card__header">
            <div class="meta-card__icon" style="background: var(--accent-bg); color: var(--accent);">${Icons.clipboardCheck}</div>
            <span class="badge badge--info" style="font-size: 10px;">Del sistema</span>
          </div>
          <div class="meta-card__title">Actividades semanales</div>
          <div class="meta-card__desc">Visitas, llamadas, reuniones registradas</div>
          <div style="margin-top: 14px;">
            <div class="meta-card__progress-row">
              <div>
                <span class="meta-current" style="color: var(--accent);">18</span>
                <span class="meta-target">/ 20 esta semana</span>
              </div>
              <span class="meta-pct" style="color: var(--accent);">90%</span>
            </div>
            <div class="meta-bar">
              <div class="meta-bar__fill" style="width: 90%; background: var(--accent);"></div>
            </div>
            <div style="font-size: 11.5px; color: var(--text-muted);">
              Faltan <strong style="color: var(--text-primary);">2 actividades</strong> en 3 días · Promedio: 4.5/día
            </div>
          </div>
        </div>

      </div>

      <div style="display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; margin-bottom: 16px;">
        <div class="card">
          <div class="card__header">
            <div>
              <div class="card__title">Progreso semanal de ventas</div>
              <div class="card__subtitle">Ventas cerradas por semana del año · Línea punteada: meta semanal</div>
            </div>
            <div style="display: flex; gap: 12px; font-size: 12px;">
              <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; background: var(--primary); border-radius: 2px;"></span> Ventas</span>
              <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 14px; height: 0; border-top: 2px dashed var(--accent);"></span> Meta</span>
            </div>
          </div>
          <div class="card__body">
            <div class="week-chart">
              ${[
                { w: 'S1', v: 60, label: '$ 45 M' },
                { w: 'S2', v: 80, label: '$ 60 M' },
                { w: 'S3', v: 70, label: '$ 52 M' },
                { w: 'S4', v: 90, label: '$ 68 M' },
                { w: 'S5', v: 85, label: '$ 64 M' },
                { w: 'S6', v: 95, label: '$ 72 M' },
                { w: 'S7', v: 100, label: '$ 75 M' },
                { w: 'S8', v: 88, label: '$ 66 M' },
                { w: 'S9', v: 82, label: '$ 62 M' },

                { w: 'S12', v: 45, label: '$ 34 M', current: true },

                  <span class="week-label" style="${w.current ? 'color: var(--accent); font-weight: 700;' : ''}">${w.w}</span>

            <div style="display: flex; justify-content: space-between; padding-top: 14px; border-top: 1px solid var(--border); margin-top: 8px;">
              <div>
                <div style="font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Promedio semanal</div>

          <div class="card__body">

      </div>

}

document.getElementById('shell').innerHTML = `${renderSidebar('metas','ejecutivo')}<div class="main-area">${renderTopbar({title:'Mis metas'})}${content()}</div>`;
</script>
</body>
</html>
