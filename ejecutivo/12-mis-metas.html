<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Mis Metas</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 40px; }

  .goal-hero {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff;
    border-radius: 16px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }
  .goal-hero::before {
    content: '';
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(243, 150, 16, 0.25) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .hero-ring {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0 72%, rgba(255,255,255,0.15) 72%);
    position: relative;
    flex-shrink: 0;
  }
  .hero-ring::before {
    content: ''; position: absolute; inset: 10px;
    background: var(--primary-dark);
    border-radius: 50%;
  }
  .hero-ring__inner {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1;
  }
  .hero-ring__value { font-size: 40px; font-weight: 800; letter-spacing: -0.02em; }
  .hero-ring__label { font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }

  .meta-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 180ms;
    position: relative;
    overflow: hidden;
  }
  .meta-card:hover { box-shadow: var(--shadow-md); }
  .meta-card__stripe {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
  }
  .meta-card__header {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .meta-card__icon {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .meta-card__title {
    font-size: 14px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 2px;
  }
  .meta-card__desc {
    font-size: 11.5px; color: var(--text-muted);
  }
  .meta-card__progress-row {
    display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 6px;
  }
  .meta-current { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .meta-target {
    font-size: 12px; color: var(--text-muted);
    font-weight: 500;
  }
  .meta-pct {
    font-size: 13px; font-weight: 700;
  }
  .meta-bar {
    height: 8px; background: var(--page-bg);
    border-radius: 4px; overflow: hidden;
    margin-bottom: 10px;
  }
  .meta-bar__fill {
    height: 100%; border-radius: 4px;
    transition: width 400ms ease;
  }

  .week-chart {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 4px;
    padding: 16px 0;
  }
  .week-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .week-bar {
    width: 100%; background: var(--page-bg);
    border-radius: 3px; position: relative;
    height: 80px;
    overflow: hidden;
  }
  .week-bar__fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--primary); border-radius: 3px;
  }
  .week-bar__target {
    position: absolute; left: 0; right: 0;
    border-top: 2px dashed var(--accent);
  }
  .week-label {
    font-size: 10px; color: var(--text-muted);
    font-weight: 600;
  }

  .achievement-card {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
  }
  .achievement-card__icon {
    width: 40px; height: 40px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .achievement-card--unlocked {
    background: #FFF9EC;
    border-color: #F5D98C;
  }
  .achievement-card--locked {
    opacity: 0.55;
  }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
window.modalRoot = document.getElementById('shell');
function openModal(html) { modalRoot.innerHTML += html; }
function closeModal() {
  const overlays = document.querySelectorAll('.modal-overlay');
  if (overlays.length > 0) overlays[overlays.length - 1].remove();
}

function editarMetaModal() {
  return `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-content" style="max-width: 560px;">
        <div class="modal-header">
          <div class="modal-header__icon" style="background: var(--primary-bg); color: var(--primary);">${Icons.pencil}</div>
          <div>
            <div style="font-weight: 700; font-size: 16px;">Editar metas personales</div>
            <div style="font-size: 12.5px; color: var(--text-muted);">Abril 2026</div>
          </div>
          <button class="topbar__icon-btn" onclick="closeModal()">${Icons.close}</button>
        </div>
        <div class="modal-body">
          <div style="font-size: 12.5px; font-weight: 600; color: var(--text-primary); margin-bottom: 10px;">Tus metas personales (marcadas con ⭐)</div>
          ${[
            { label: 'Clientes nuevos', actual: 4, meta: 5, color: '#7C3AED' },
            { label: 'Tasa de conversión leads', actual: '42%', meta: '40%', color: '#3B82F6' },
            { label: 'Visitas al sector Agro', actual: 3, meta: 8, color: 'var(--error)' },
          ].map(m => `
            <div style="display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px;">
              <div style="flex: 1;">
                <div style="font-weight: 600; font-size: 13px; color: var(--text-primary);">${m.label}</div>
                <div style="font-size: 12px; color: var(--text-muted);">Actual: ${m.actual}</div>
              </div>
              <div class="form-field" style="margin: 0; min-width: 100px;">
                <label class="form-field__label" style="font-size: 10px;">Meta</label>
                <input class="input" value="${m.meta}" />
              </div>
            </div>
          `).join('')}
          <div class="alert alert--info" style="margin-top: 8px;">${Icons.informationCircle}<div style="font-size: 12px;">Las metas del sistema (ventas, actividades, oportunidades) solo pueden ser editadas por el director.</div></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn--secondary" onclick="closeModal()">Cancelar</button>
          <button class="btn btn--primary" onclick="closeModal()">${Icons.check} Guardar metas</button>
        </div>
      </div>
    </div>
  `;
}

function content() {

        </div>

              <div class="hero-ring__label">Completado</div>

          </div>

            <div style="font-size: 28px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 10px;">

            </div>
            <div style="display: flex; gap: 12px; margin-top: 16px;">

          </div>
          <div style="display: flex; gap: 6px;">
            <button class="btn btn--ghost btn--sm" style="background: var(--primary-bg); color: var(--primary);">Todas (6)</button>

          <div class="meta-card__header">

            </div>
          </div>
        </div>

        <div class="meta-card">
          <div class="meta-card__stripe" style="background: var(--primary);"></div>
          <div class="meta-card__header">
            <div class="meta-card__icon" style="background: var(--primary-bg); color: var(--primary);">${Icons.briefcase}</div>
            <span class="badge badge--info" style="font-size: 10px;">Del sistema</span>
          </div>
          <div class="meta-card__title">Oportunidades abiertas</div>
          <div class="meta-card__desc">Cantidad mínima activa en pipeline</div>
          <div style="margin-top: 14px;">
            <div class="meta-card__progress-row">
              <div>
                <span class="meta-current" style="color: var(--primary);">12</span>
                <span class="meta-target">/ 10 opp.</span>
              </div>
              <span class="meta-pct" style="color: var(--success);">120%</span>
            </div>
            <div class="meta-bar">

              ✓ Meta superada · 2 oportunidades por encima

        </div>

        <div class="meta-card">

          </div>

                <span class="meta-target">/ 5 clientes</span>
              </div>
              <span class="meta-pct" style="color: #A855F7;">80%</span>
            </div>
            <div class="meta-bar">
              <div class="meta-bar__fill" style="width: 80%; background: #A855F7;"></div>
            </div>
            <div style="font-size: 11.5px; color: var(--text-muted);">
              Falta <strong style="color: var(--text-primary);">1 cliente nuevo</strong> · Tienes 3 leads trasladados a distribuidor cerca
            </div>
          </div>
        </div>

        <div class="meta-card">
          <div class="meta-card__stripe" style="background: #3B82F6;"></div>
          <div class="meta-card__header">
            <div class="meta-card__icon" style="background: #EEF1FA; color: #3B82F6;">${Icons.funnel}</div>
            <span class="badge badge--accent" style="font-size: 10px;">Personal ⭐</span>

        <div class="meta-card">
          <div class="meta-card__stripe" style="background: var(--error);"></div>

            <div class="meta-card__icon" style="background: #FDECEA; color: var(--error);">${Icons.mapPin}</div>

            ].map(a => `
              <div style="display: flex; align-items: flex-start; gap: 12px; padding: 10px; background: ${a.bg}; border-radius: 6px; margin-bottom: 8px;">

                <div style="flex: 1;">

                    <span style="font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 1px 6px; background: ${a.iconColor}; color: #fff; border-radius: 8px;">${a.priority}</span>
                    <strong style="font-size: 12.5px; color: var(--text-primary);">${a.action}</strong>
                  </div>
                  <div style="font-size: 11.5px; color: var(--text-secondary); line-height: 1.4;">${a.detail}</div>
                </div>
              </div>
            `).join('')}
            <button class="btn btn--secondary btn--block" style="margin-top: 6px;">Ver todas las recomendaciones</button>
          </div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div class="card">
          <div class="card__header">
            <div>
              <div class="card__title">Histórico de cumplimiento</div>
              <div class="card__subtitle">Últimos 6 meses · % de cumplimiento global</div>
            </div>
          </div>
          <div class="card__body">
            ${[
              { mes: 'Noviembre 2025', pct: 94, valor: '$ 328 M', meta: '$ 350 M', color: 'var(--success)', etiqueta: 'Superaste' },
              { mes: 'Diciembre 2025', pct: 78, valor: '$ 275 M', meta: '$ 350 M', color: 'var(--accent)', etiqueta: 'Cerca' },
              { mes: 'Enero 2026', pct: 88, valor: '$ 310 M', meta: '$ 350 M', color: 'var(--success)', etiqueta: 'Bien' },
              { mes: 'Febrero 2026', pct: 105, valor: '$ 368 M', meta: '$ 350 M', color: 'var(--success)', etiqueta: 'Superaste ★' },
              { mes: 'Marzo 2026', pct: 112, valor: '$ 392 M', meta: '$ 350 M', color: 'var(--success)', etiqueta: 'Superaste ★' },
              { mes: 'Abril 2026', pct: 81, valor: '$ 285 M', meta: '$ 350 M', color: 'var(--accent)', etiqueta: 'En curso', current: true },
            ].map(h => `
              <div style="padding: 10px 0; border-bottom: 1px solid var(--border); ${h.current ? 'background: var(--primary-bg); margin: 0 -16px; padding: 10px 16px;' : ''}">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                  <div style="display: flex; align-items: center; gap: 8px;">
                    <strong style="font-size: 13px; color: var(--text-primary);">${h.mes}</strong>
                    ${h.current ? '<span class="badge badge--info" style="font-size: 10px;">● En curso</span>' : ''}
                  </div>
                  <div style="display: flex; align-items: center; gap: 10px; font-size: 12px;">
                    <span style="color: var(--text-muted);">${h.valor} / ${h.meta}</span>
                    <strong style="color: ${h.color}; font-size: 13px; min-width: 40px; text-align: right;">${h.pct}%</strong>
                  </div>
                </div>
                <div class="progress__bar">
                  <div class="progress__fill" style="width: ${Math.min(h.pct, 100)}%; background: ${h.color};"></div>
                </div>
              </div>
            `).join('')}
            <div style="padding-top: 12px; display: flex; justify-content: space-between; font-size: 12.5px;">
              <span style="color: var(--text-muted);">Promedio 6 meses</span>
              <strong style="color: var(--success);">93% cumplimiento</strong>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card__header">
            <div>
              <div class="card__title">🏆 Mis logros</div>
              <div class="card__subtitle">Reconocimientos ganados este año</div>
            </div>
            <span class="badge badge--accent">4 de 9</span>
          </div>
          <div class="card__body">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
              <div class="achievement-card achievement-card--unlocked">
                <div class="achievement-card__icon" style="background: #FFF4CC;">🥇</div>
                <div>
                  <div style="font-weight: 700; font-size: 12.5px; color: var(--text-primary);">Top 3 del mes</div>
                  <div style="font-size: 10.5px; color: var(--text-muted);">Marzo 2026</div>
                </div>
              </div>
              <div class="achievement-card achievement-card--unlocked">
                <div class="achievement-card__icon" style="background: #FFF4CC;">🔥</div>
                <div>
                  <div style="font-weight: 700; font-size: 12.5px; color: var(--text-primary);">Racha 3 meses</div>
                  <div style="font-size: 10.5px; color: var(--text-muted);">Meta superada</div>
                </div>
              </div>
              <div class="achievement-card achievement-card--unlocked">
                <div class="achievement-card__icon" style="background: #FFF4CC;">⭐</div>
                <div>
                  <div style="font-weight: 700; font-size: 12.5px; color: var(--text-primary);">Cierre del millón</div>
                  <div style="font-size: 10.5px; color: var(--text-muted);">Opp > $500M</div>
                </div>
              </div>
              <div class="achievement-card achievement-card--unlocked">
                <div class="achievement-card__icon" style="background: #FFF4CC;">📍</div>
                <div>
                  <div style="font-weight: 700; font-size: 12.5px; color: var(--text-primary);">100 visitas</div>
                  <div style="font-size: 10.5px; color: var(--text-muted);">GPS registradas</div>
                </div>
              </div>
              <div class="achievement-card achievement-card--locked">
                <div class="achievement-card__icon" style="background: var(--page-bg); filter: grayscale(1);">🎯</div>
                <div>
                  <div style="font-weight: 700; font-size: 12.5px; color: var(--text-muted);">5 cierres seguidos</div>
                  <div style="font-size: 10.5px; color: var(--text-disabled);">2/5 ganadas</div>
                </div>
              </div>
              <div class="achievement-card achievement-card--locked">
                <div class="achievement-card__icon" style="background: var(--page-bg); filter: grayscale(1);">💎</div>
                <div>
                  <div style="font-weight: 700; font-size: 12.5px; color: var(--text-muted);">Cliente premium</div>
                  <div style="font-size: 10.5px; color: var(--text-disabled);">Opp > $1B</div>
                </div>
              </div>
              <div class="achievement-card achievement-card--locked">
                <div class="achievement-card__icon" style="background: var(--page-bg); filter: grayscale(1);">🚀</div>
                <div>
                  <div style="font-weight: 700; font-size: 12.5px; color: var(--text-muted);">Ejecutivo del año</div>
                  <div style="font-size: 10.5px; color: var(--text-disabled);">Ranking #1</div>
                </div>
              </div>
              <div class="achievement-card achievement-card--locked">
                <div class="achievement-card__icon" style="background: var(--page-bg); filter: grayscale(1);">🌟</div>
                <div>
                  <div style="font-weight: 700; font-size: 12.5px; color: var(--text-muted);">Racha épica</div>
                  <div style="font-size: 10.5px; color: var(--text-disabled);">6 meses sobre meta</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `${renderSidebar('metas','ejecutivo')}<div class="main-area">${renderTopbar({title:'Mis metas'})}${content()}</div>`;
</script>
</body>
