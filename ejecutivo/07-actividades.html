<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Actividades</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 24px; }
  .canvas-section-title { font: 700 15px 'Roboto'; color: #24388C; margin: 40px 0 20px; padding: 8px 14px; background: #fff; border: 1px solid #E5E5E5; border-radius: 6px; display: inline-block; }

  .activity-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    transition: background 180ms;
    cursor: pointer;
  }
  .activity-row:hover { background: var(--page-bg); }
  .activity-row__icon {
    width: 40px; height: 40px; border-radius: 8px;
    background: var(--primary-bg); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .activity-row__icon--llamada { background: #E8F5EE; color: var(--success); }
  .activity-row__icon--email { background: #F3E8FF; color: #7C3AED; }
  .activity-row__icon--visita { background: var(--accent-bg); color: #C7770D; }
.activity-row__icon--reunion { background: var(--primary-bg); color: var(--primary); }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .calendar-header-cell {
    background: var(--page-bg);
    padding: 10px 8px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .calendar-cell {
    background: var(--surface);
    min-height: 100px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .calendar-cell--other-month { background: var(--page-bg); }
  .calendar-cell--other-month .cal-day-num { color: var(--text-muted); opacity: 0.5; }
  .calendar-cell--today .cal-day-num {
    background: var(--primary);
    color: #fff;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cal-day-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
  }
  .cal-events { display: flex; flex-direction: column; gap: 3px; }
  .cal-event {
    font-size: 10.5px;
    font-weight: 600;
    padding: 3px 6px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: opacity 150ms;
  }
  .cal-event:hover { opacity: 0.8; }
  .cal-event--visita { background: var(--accent-bg); color: #C7770D; border-left: 2px solid var(--accent); }
  .cal-event--llamada { background: #E8F5EE; color: var(--success); border-left: 2px solid var(--success); }
  .cal-event--email { background: #F3E8FF; color: #7C3AED; border-left: 2px solid #7C3AED; }
  .cal-event--reunion { background: var(--primary-bg); color: var(--primary); border-left: 2px solid var(--primary); }
  .cal-more {
    font-size: 10px;
    color: var(--text-muted);
    padding: 2px 6px;
    font-weight: 600;
  }
  .calendar-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .calendar-nav__title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .calendar-nav__btns { display: flex; gap: 6px; }
  .cal-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
  .cal-dot--visita { background: var(--accent); }
  .cal-dot--llamada { background: var(--success); }
  .cal-dot--email { background: #7C3AED; }
  .cal-dot--reunion { background: var(--primary); }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
const actividades = [
  { tipo: 'email', icon: 'envelope', iconClass: 'email', titulo: 'Envío información técnica Sello FM - FIRELINE', sub: 'Se envió información técnica de sello FM y fichas técnicas', date: '3:00 PM', day: 'Hoy', badge: 'ganada', badgeText: 'Completada', year: 2025, month: 6, day: 15},
  { tipo: 'llamada', icon: 'phone', iconClass: 'llamada', titulo: 'Seguimiento oferta - FIRELINE', sub: 'Cliente indica que compraron a través de COSERINCO', date: '9:00 AM', day: 'Hoy', badge: 'ganada', badgeText: 'Completada', year: 2025, month: 6, day: 24},
  { tipo: 'email', icon: 'envelope', iconClass: 'email', titulo: 'Envío Cotización No. 584 - COL PROYECTOS', sub: 'Cotización enviada para proyecto en Sabanalarga', date: '10:30 AM', day: 'Hoy', badge: 'ganada', badgeText: 'Completada', year: 2025, month: 7, day: 16},
  { tipo: 'llamada', icon: 'phone', iconClass: 'llamada', titulo: 'Seguimiento ADOS Ingeniería - Apartadó', sub: 'Proceso aún no ha sido adjudicado, sigue en seguimiento', date: '8:15 AM', day: 'Ayer', badge: 'ganada', badgeText: 'Completada', year: 2025, month: 4, day: 21},
  { tipo: 'email', icon: 'envelope', iconClass: 'email', titulo: 'Oferta Cotización No. 30987 - CFG Proyectos', sub: 'Seguimiento telefónico, oferta de tubería y accesorios PE', date: '2:00 PM', day: 'Mañana', badge: 'ganada', badgeText: 'Completada', year: 2025, month: 5, day: 19},
  { tipo: 'llamada', icon: 'phone', iconClass: 'llamada', titulo: 'Seguimiento UT Balsa 3 - Tocancipa', sub: 'Proyecto ya se venía trabajando con otro cliente', date: '11:00 AM', day: 'Viernes', badge: 'ganada', badgeText: 'Completada', year: 2025, month: 6, day: 17},
  { tipo: 'email', icon: 'envelope', iconClass: 'email', titulo: 'Envío Cotización No. 20250626 - FIRELINE', sub: 'Cotización para proyecto RCI en Seren del Mar, Cartagena', date: '9:30 AM', day: 'Lun 27', badge: 'ganada', badgeText: 'Completada', year: 2025, month: 6, day: 26},
  { tipo: 'llamada', icon: 'phone', iconClass: 'llamada', titulo: 'Seguimiento CIVILE Hidráulicos - Magangué', sub: 'Oferta en revisión por el cliente', date: '4:00 PM', day: 'Mié 29', badge: 'ganada', badgeText: 'Completada', year: 2025, month: 8, day: 25},
  { tipo: 'email', icon: 'envelope', iconClass: 'email', titulo: 'Oferta Cotización No. 1248 - Promotora Imola', sub: 'Cotización enviada para proyecto Imola Park, Cartagena', date: '10:00 AM', day: 'Jue 30', badge: 'ganada', badgeText: 'Completada', year: 2025, month: 8, day: 19},
  { tipo: 'llamada', icon: 'phone', iconClass: 'llamada', titulo: 'Seguimiento Monstruos JM - La Dorada', sub: 'No toman decisión, tienen varias ofertas más económicas', date: '3:30 PM', day: 'Vie 1 May', badge: 'ganada', badgeText: 'Completada', year: 2025, month: 5, day: 13},
];

const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAY_NAMES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

let currentCalYear = 2026;
let currentCalMonth = 3;
let currentView = 'lista';

function getCalDays(y, m) {
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const daysInPrevMonth = new Date(y, m, 0).getDate();
  const cells = [];
  for (let i = firstDay - 1; i >= 0; i--) {
    cells.push({ day: daysInPrevMonth - i, otherMonth: true, pM: m === 0 ? 11 : m - 1, pY: m === 0 ? y - 1 : y });
  }
  for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, otherMonth: false });
  const remaining = 42 - cells.length;
  for (let d = 1; d <= remaining; d++) {
    cells.push({ day: d, otherMonth: true, pM: m === 11 ? 0 : m + 1, pY: m === 11 ? y + 1 : y });
  }
  return cells;
}

function getEventsForCell(y, m, d) {
  return actividades.filter(a => a.year === y && a.month === m && a.day === d);
}

function calendarContent() {
  const cells = getCalDays(currentCalYear, currentCalMonth);
  const today = new Date();
  const isToday = (y, m, d) => today.getFullYear() === y && today.getMonth() === m && today.getDate() === d;

  let cellHtml = '';
  cells.forEach(cell => {
    const ey = cell.otherMonth ? cell.pY : currentCalYear;
    const em = cell.otherMonth ? cell.pM : currentCalMonth;
    const events = getEventsForCell(ey, em, cell.day);
    const todayClass = isToday(ey, em, cell.day) ? 'calendar-cell--today' : '';
    const otherClass = cell.otherMonth ? 'calendar-cell--other-month' : '';

    let eventsHtml = '';
    events.slice(0, 3).forEach(ev => {
      const shortTitle = ev.titulo.length > 22 ? ev.titulo.substring(0, 22) + '…' : ev.titulo;
      eventsHtml += `<div class="cal-event cal-event--${ev.iconClass}" title="${ev.titulo}" onclick="location.href='18-actividad-detalle.html'">${shortTitle}</div>`;
    });
    if (events.length > 3) {
      eventsHtml += `<div class="cal-more">+${events.length - 3} más</div>`;
    }

    cellHtml += `<div class="calendar-cell ${todayClass} ${otherClass}">
      <div class="cal-day-num">${cell.day}</div>
      <div class="cal-events">${eventsHtml}</div>
    </div>`;
  });

  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Mis actividades</div>
          <div class="page-head__subtitle">${actividades.length} actividades · Vista calendario</div>
        </div>
        <div class="page-head__actions">
          <div class="tabs" style="border-bottom: none; margin-bottom: 0;">
            <a class="tab" onclick="switchView('lista')">Lista</a>
            <a class="tab is-active" onclick="switchView('calendario')">Calendario</a>
          </div>
          <button class="btn btn--primary btn--sm">${Icons.plus} Registrar</button>
        </div>
      </div>

      <div class="filter-bar">
        <div style="display: flex; gap: 8px; align-items: center;">
          <span class="cal-dot cal-dot--visita"></span><span style="font-size:12px;color:var(--text-muted)">Visita</span>
          <span class="cal-dot cal-dot--llamada"></span><span style="font-size:12px;color:var(--text-muted)">Llamada</span>
          <span class="cal-dot cal-dot--email"></span><span style="font-size:12px;color:var(--text-muted)">Email</span>
          <span class="cal-dot cal-dot--reunion"></span><span style="font-size:12px;color:var(--text-muted)">Reunión</span>
        </div>
      </div>

      <div class="calendar-nav">
        <button class="btn btn--ghost btn--sm" onclick="calNav(-1)">${Icons.chevronLeft} Anterior</button>
        <div class="calendar-nav__title">${MONTH_NAMES[currentCalMonth]} ${currentCalYear}</div>
        <button class="btn btn--ghost btn--sm" onclick="calNav(1)">Siguiente ${Icons.chevronRight}</button>
      </div>

      <div class="calendar-grid">
        ${DAY_NAMES.map(d => `<div class="calendar-header-cell">${d}</div>`).join('')}
        ${cellHtml}
      </div>
    </div>
  `;
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('is-active', t.textContent.trim().toLowerCase() === (view === 'lista' ? 'Lista' : view === 'calendario' ? 'Calendario' :"" ));
  });
  renderMainContent();
}

function calNav(dir) {
  currentCalMonth += dir;
  if (currentCalMonth > 11) { currentCalMonth = 0; currentCalYear++; }
  if (currentCalMonth < 0) { currentCalMonth = 11; currentCalYear--; }
  renderMainContent();
}

function renderMainContent() {
  const mainArea = document.querySelector('.main-area');
  if (!mainArea) return;
  if (currentView === 'calendario') {
    mainArea.innerHTML = renderTopbar({title:'Mis actividades'}) + calendarContent();
  } else {
    mainArea.innerHTML = renderTopbar({title:'Mis actividades'}) + listContent();
  }
}

function activityRow(a) {
  return `
    <a href="18-actividad-detalle.html" style="text-decoration: none; color: inherit;">
      <div class="activity-row">
        <div class="activity-row__icon activity-row__icon--${a.iconClass}">${Icons[a.icon]}</div>
        <div style="flex:1; min-width: 0;">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 2px;">
            <span style="font-size: 14px; font-weight: 600; color: var(--text-primary);">${a.titulo}</span>
          </div>
          <div style="font-size: 12.5px; color: var(--text-muted);">${a.sub}</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0;">
          <span class="badge badge--${a.badge}"><span class="dot"></span> ${a.badgeText}</span>
          <span style="font-size: 12px; color: var(--text-muted);">${a.day} · ${a.date}</span>
        </div>
      </div>
    </a>
  `;
}

function listContent() {
  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Mis actividades</div>
          <div class="page-head__subtitle">${actividades.length} actividades · 3 completadas hoy</div>
        </div>
        <div class="page-head__actions">
          <div class="tabs" style="border-bottom: none; margin-bottom: 0;">
            <a class="tab is-active" onclick="switchView('lista')">Lista</a>
            <a class="tab" onclick="switchView('calendario')">Calendario</a>
          </div>
          <a href="13-actividad-detalle.html" style="text-decoration: none; color: inherit; font: inherit; cursor: pointer;">
           <button class="btn btn--primary btn--sm">${Icons.plus} Registrar</button>
          </a>
        </div>
      </div>

      <div class="filter-bar">
        <div class="input-wrapper" style="flex:1; max-width: 320px;">${Icons.search}<input class="input input--with-icon" placeholder="Buscar actividad..."></div>
        <select class="select" style="max-width: 180px;">
          <option>Todos los tipos</option>
          <option>Llamadas</option>
          <option>Visitas</option>
          <option>Reuniones</option>
          <option>Emails</option>
        </select>
        <select class="select" style="max-width: 180px;">
          <option>Esta semana</option>
          <option>Hoy</option>
          <option>Este mes</option>
          <option>Último trimestre</option>
        </select>
      </div>

      <div class="card" style="padding: 0;">
        <div style="padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--page-bg); display: flex; align-items: center; justify-content: space-between;">
          <span style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;">Hoy · 19 Abr 2026</span>
          <span style="font-size: 12px; color: var(--text-muted);">3 actividades</span>
        </div>
        ${actividades.slice(0, 3).map(activityRow).join('')}

        <div style="padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--page-bg); display: flex; align-items: center; justify-content: space-between;">
          <span style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;">Ayer · 18 Abr 2026</span>
          <span style="font-size: 12px; color: var(--text-muted);">1 actividad</span>
        </div>
        ${actividades.slice(3, 4).map(activityRow).join('')}

        <div style="padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--page-bg); display: flex; align-items: center; justify-content: space-between;">
          <span style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;">Próximas</span>
          <span style="font-size: 12px; color: var(--text-muted);">2 agendadas</span>
        </div>
        ${actividades.slice(4).map(activityRow).join('')}
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `${renderSidebar('actividades', 'ejecutivo')}<div class="main-area">${renderTopbar({title:'Mis actividades'})}${listContent()}</div>`;
</script>
</body>
</html>
