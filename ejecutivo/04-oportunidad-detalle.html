<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Detalle Oportunidad</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .detail-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .detail-header__row {
    display: flex; align-items: flex-start; gap: 16px; justify-content: space-between;
  }
  .detail-title {
    font-size: 22px; font-weight: 800; color: var(--text-primary);
    letter-spacing: -0.02em; line-height: 1.2;
  }
  .detail-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .detail-meta {
    display: flex; gap: 24px; margin-top: 16px;
    padding-top: 16px; border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .detail-meta__item { display: flex; flex-direction: column; gap: 2px; }
  .detail-meta__label {
    font-size: 10.5px; font-weight: 600; color: var(--text-disabled);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .detail-meta__value { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .detail-meta__value--accent { color: var(--accent); font-size: 17px; font-weight: 700; }

  .producto-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .producto-row:last-child { border-bottom: none; }
  .producto-icon {
    width: 40px; height: 40px; border-radius: 8px;
    background: var(--primary-bg); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
  }

  .modal-overlay {
    position: absolute; inset: 0;
    background: rgba(26,26,26,0.5);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 60px 24px; z-index: 100;
  }
  .modal-content {
    background: var(--surface); border-radius: 12px;
    max-width: 580px; width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden;
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    gap: 12px;
  }
  .modal-header > :first-child { flex-shrink: 0; }
  .modal-header > :not(:first-child):not(:last-child) { flex: 1; }
  .modal-header__icon--success { background: var(--success-bg); color: var(--success); }
  .modal-header__icon--error { background: var(--error-bg); color: var(--error); }
  .modal-header__icon--primary { background: var(--primary-bg); color: var(--primary); }
  .modal-header__icon--accent { background: var(--accent-bg); color: var(--accent); }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 10px; background: var(--page-bg);
  }

  .confetti {
    position: absolute; inset: 0; pointer-events: none;
    overflow: hidden; z-index: 99;
  }
  .confetti::before, .confetti::after {
    content: '🎉'; position: absolute; font-size: 32px;
    animation: float 3s ease-in-out infinite;
  }
  .confetti::before { top: 40px; left: 30%; }
  .confetti::after { top: 100px; right: 28%; animation-delay: 0.5s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-15px) rotate(10deg); }
  }

  .motivo-option {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer; transition: all 180ms; margin-bottom: 8px;
  }
  .motivo-option:hover { border-color: var(--primary); background: var(--primary-bg); }
  .motivo-option.is-selected--success { border-color: var(--success); background: var(--success-bg); }
  .motivo-option.is-selected--error { border-color: var(--error); background: var(--error-bg); }
  .motivo-option__radio {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--border-input); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .motivo-option.is-selected--success .motivo-option__radio { border-color: var(--success); }
  .motivo-option.is-selected--success .motivo-option__radio::after {
    content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--success);
  }
  .motivo-option.is-selected--error .motivo-option__radio { border-color: var(--error); }
  .motivo-option.is-selected--error .motivo-option__radio::after {
    content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--error);
  }

  .activity-type-selector {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .activity-type-card {
    padding: 16px 8px; border: 1px solid var(--border);
    border-radius: 8px; text-align: center; cursor: pointer;
    transition: all 180ms; display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    background: var(--surface);
  }
  .activity-type-card:hover { border-color: var(--primary); }
  .activity-type-card.is-active {
    border-color: var(--primary); background: var(--primary-bg);
  }
  .activity-type-card__icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: var(--page-bg);
  }
  .activity-type-card.is-active .activity-type-card__icon {
    background: var(--primary); color: #fff;
  }
  .activity-type-card__label {
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
  }
  .activity-type-card.is-active .activity-type-card__label {
    color: var(--primary);
  }

  .big-map {
    height: 280px;
    border-radius: 8px;
    background-color: #E8EEF5;
    background-image:
      linear-gradient(rgba(36, 56, 140, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(36, 56, 140, 0.06) 1px, transparent 1px),
      radial-gradient(circle at 30% 40%, rgba(243, 150, 16, 0.1), transparent 50%);
    background-size: 24px 24px, 24px 24px, auto;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .map-main-pin {
    position: absolute;
    top: 45%; left: 50%;
    transform: translate(-50%, -100%);
    width: 36px; height: 36px;
    background: var(--primary);
    border: 4px solid #fff;
    border-radius: 50%;
    box-shadow: 0 4px 12px rgba(36, 56, 140, 0.4);
    z-index: 2;
  }
  .map-main-pin::after {
    content: '';
    position: absolute;
    left: 50%; bottom: -10px;
    transform: translateX(-50%);
    width: 2px; height: 10px;
    background: var(--primary);
  }
  .map-main-pin::before {
    content: '';
    position: absolute;
    inset: 6px;
    background: #fff;
    border-radius: 50%;
  }
  .pulse-ring {
    position: absolute;
    top: 45%; left: 50%;
    transform: translate(-50%, -100%);
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 2px solid var(--primary);
    opacity: 0.3;
    animation: pulse 2s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: translate(-50%, -100%) scale(0.5); opacity: 0.6; }
    100% { transform: translate(-50%, -100%) scale(2); opacity: 0; }
  }
  .gps-indicator {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(6px);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--success);
    display: flex; align-items: center; gap: 6px;
    box-shadow: var(--shadow-sm);
  }
  .gps-indicator::before {
    content: '';
    width: 8px; height: 8px;
    background: #22C55E;
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
    animation: blink 1.5s ease infinite;
  }
  @keyframes blink {
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>
  </div>
</div>

<script src="../shared/components.js"></script>
<script>
window.modalRoot = document.getElementById('shell');

function openModal(html) {
  modalRoot.innerHTML += html;
}
function closeModal() {
  const overlays = document.querySelectorAll('.modal-overlay');
  if (overlays.length > 0) overlays[overlays.length - 1].remove();
}
