<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Proyectos</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 24px; }
  .canvas-section-title { font: 700 15px 'Roboto'; color: #24388C; margin: 40px 0 20px; padding: 8px 14px; background: #fff; border: 1px solid #E5E5E5; border-radius: 6px; display: inline-block; }

  .proyecto-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; display: flex; flex-direction: column;
    gap: 12px; cursor: pointer; transition: all 180ms;
  }
  .proyecto-card:hover { border-color: var(--primary); box-shadow: var(--shadow-md); }
  .proyecto-card__header { display: flex; align-items: flex-start; gap: 12px; }
  .proyecto-card__icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--primary-bg); color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .proyecto-card__icon--success { background: #dcfce7; color: var(--green-bright); }
  .proyecto-card__icon--warning { background: var(--accent-bg); color: var(--accent); }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
window.modalRoot = document.getElementById('shell');
function openModal(html) { modalRoot.innerHTML += html; }
function closeModal() {
  const overlays = document.querySelectorAll('.modal-overlay');
  if (overlays.length > 0) overlays[overlays.length - 1].remove();
}

function editarProyectoModal() {
  return `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-content" style="max-width: 560px;">
        <div class="modal-header">
          <div class="modal-header__icon" style="background: var(--primary-bg); color: var(--primary);">${Icons.pencil}</div>
          <div>
            <div style="font-weight: 700; font-size: 16px;">Editar proyecto</div>
            <div style="font-size: 12.5px; color: var(--text-muted);">PRY-2026-0012</div>
          </div>
          <button class="topbar__icon-btn" onclick="closeModal()">${Icons.close}</button>
        </div>
        <div class="modal-body">
          <div class="form-field" style="margin-bottom: 14px;">
            <label class="form-field__label">Nombre del proyecto <span class="req">*</span></label>
            <input class="input" value="Acueducto rural Piedecuesta Fase 1" />
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px;">
            <div class="form-field">
              <label class="form-field__label">Estado</label>
              <select class="select">
                <option>Planificación</option>
                <option selected>En ejecución</option>
                <option>En pausa</option>
                <option>Entregado</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-field__label">Porcentaje completado</label>
              <input class="input" type="number" value="45" />
            </div>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px;">
            <div class="form-field">
              <label class="form-field__label">Fecha de inicio</label>
              <input class="input" type="date" value="2026-03-01" />
            </div>
            <div class="form-field">
              <label class="form-field__label">Fecha de fin</label>
              <input class="input" type="date" value="2026-08-30" />
            </div>
          </div>
          <div class="form-field">
            <label class="form-field__label">Descripción</label>
            <textarea class="textarea" rows="2">Construcción de red de distribución de agua potable en zona rural, fase 1 - conducción principal 3km.</textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn--secondary" onclick="closeModal()">Cancelar</button>
          <button class="btn btn--primary" onclick="closeModal()">${Icons.check} Guardar cambios</button>
        </div>
      </div>
    </div>
  `;
}

const proyectos = [
  { nombre: 'Acueducto rural Piedecuesta Fase 1', empresa: 'EMPAS S.A.', estado: 'En ejecución', badge: 'propuesta', progress: 45, inicio: '01 Mar 2026', fin: '30 Ago 2026', valor: '$ 485 M', icon: 'warning' },
  { nombre: 'Suministro tubería anual 2025', empresa: 'Tecnoagua SAS', estado: 'Planificación', badge: 'prospecto', progress: 15, inicio: '15 Mar 2026', fin: '30 Dic 2026', valor: '$ 215 M', icon: 'default' },
  { nombre: 'Ampliación red gas sector 8', empresa: 'Hidrosas SA', estado: 'Entregado', badge: 'ganada', progress: 100, inicio: '10 Ene 2026', fin: '28 Feb 2026', valor: '$ 180 M', icon: 'success' },
  { nombre: 'Riego Palmales Fase 2', empresa: 'Palmares del Sur', estado: 'En ejecución', badge: 'propuesta', progress: 68, inicio: '01 Feb 2026', fin: '15 May 2026', valor: '$ 125 M', icon: 'warning' },
];

function proyectoCard(p) {
  const iconClass = p.icon === 'success' ? 'proyecto-card__icon--success'
                  : p.icon === 'warning' ? 'proyecto-card__icon--warning' : '';
  return `
    <div class="proyecto-card">
      <div class="proyecto-card__header">
        <div class="proyecto-card__icon ${iconClass}">${Icons.folder}</div>
        <div style="flex:1; min-width: 0;">
          <div style="font-weight:700; color: var(--text-primary); font-size: 14px; line-height: 1.3;">${p.nombre}</div>
          <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">${p.empresa}</div>
        </div>
        <span class="badge badge--${p.badge}"><span class="dot"></span> ${p.estado}</span>
      </div>

      <div>
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">
          <span>Progreso</span>
          <span style="font-weight: 700; color: var(--text-primary);">${p.progress}%</span>
        </div>
        <div class="progress__bar"><div class="progress__fill ${p.progress === 100 ? 'progress__fill--success' : ''}" style="width: ${p.progress}%"></div></div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding-top: 10px; border-top: 1px solid var(--border);">
        <div>
          <div style="font-size: 10px; text-transform: uppercase; color: var(--text-disabled); font-weight: 600; letter-spacing: 0.04em;">Inicio</div>
          <div style="font-size: 12.5px; font-weight: 600; color: var(--text-primary); margin-top: 2px;">${p.inicio}</div>
        </div>
        <div>
          <div style="font-size: 10px; text-transform: uppercase; color: var(--text-disabled); font-weight: 600; letter-spacing: 0.04em;">Fin</div>
          <div style="font-size: 12.5px; font-weight: 600; color: var(--text-primary); margin-top: 2px;">${p.fin}</div>
        </div>
        <div>
          <div style="font-size: 10px; text-transform: uppercase; color: var(--text-disabled); font-weight: 600; letter-spacing: 0.04em;">Valor</div>
          <div style="font-size: 12.5px; font-weight: 700; color: var(--accent); margin-top: 2px;">${p.valor}</div>
        </div>
      </div>
    </div>
  `;
}

function detailContent() {
  const header = `
    <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px;">
      <div style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">
        <a href="08-proyectos.html" style="color: var(--primary); text-decoration: none;">Proyectos</a>
        <span>/</span>
        <span>PRY-2026-0012</span>
      </div>
      <div style="display: flex; gap: 16px; align-items: flex-start;">
        <div style="flex:1;">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap;">
            <span class="badge badge--propuesta"><span class="dot"></span> En ejecución</span>
            <span class="badge badge--info">Agua Potable</span>
          </div>
          <div style="font-size: 22px; font-weight: 800; color: var(--text-primary); line-height: 1.2;">
            Acueducto rural Piedecuesta Fase 1
          </div>
          <div style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">
            Generado desde oportunidad OPP-2025-0042 · EMPAS S.A.
          </div>
        </div>
          <div style="display: flex; gap: 8px;">
          <button class="btn btn--secondary btn--sm" onclick="openModal(editarProyectoModal())">${Icons.pencil} Editar</button>
          <button class="btn btn--primary btn--sm">${Icons.check} Marcar entregado</button>
        </div>
      </div>
    </div>
  `;

  const progress = `
    <div class="card">
      <div class="card__header">
        <div class="card__title">Avance del proyecto</div>
        <span class="badge badge--propuesta">45% completado</span>
      </div>
      <div class="card__body">
        <div style="margin-bottom: 16px;">
          <div class="progress__bar" style="height: 10px;">
            <div class="progress__fill" style="width: 45%;"></div>
          </div>
        </div>

        <div class="timeline">
          <div class="timeline__item">
            <div class="timeline__dot timeline__dot--success"></div>
            <div class="timeline__header">
              <div class="timeline__title">Firma de contrato</div>
              <span class="timeline__date">01 Mar</span>
            </div>
            <div class="timeline__desc">Contrato firmado y legalizado</div>
          </div>
          <div class="timeline__item">
            <div class="timeline__dot timeline__dot--success"></div>
            <div class="timeline__header">
              <div class="timeline__title">Entrega de materiales fase 1</div>
              <span class="timeline__date">15 Mar</span>
            </div>
            <div class="timeline__desc">Tubería y accesorios primera entrega</div>
          </div>
          <div class="timeline__item">
            <div class="timeline__dot"></div>
            <div class="timeline__header">
              <div class="timeline__title">Instalación red principal</div>
              <span class="timeline__date">En curso</span>
            </div>
            <div class="timeline__desc">Obra en ejecución por contratista</div>
          </div>
          <div class="timeline__item">
            <div class="timeline__dot timeline__dot--muted"></div>
            <div class="timeline__header">
              <div class="timeline__title">Pruebas de presión</div>
              <span class="timeline__date">15 Jun</span>
            </div>
            <div class="timeline__desc">Programada</div>
          </div>
          <div class="timeline__item">
            <div class="timeline__dot timeline__dot--muted"></div>
            <div class="timeline__header">
              <div class="timeline__title">Entrega final</div>
              <span class="timeline__date">30 Ago</span>
            </div>
            <div class="timeline__desc">Programada</div>
          </div>
        </div>
      </div>
    </div>
  `;

  const info = `
    <div class="card">
      <div class="card__header">
        <div class="card__title">Información</div>
          <button class="btn btn--ghost btn--sm" onclick="openModal(editarProyectoModal())">${Icons.pencil}</button>
      </div>
      <div class="card__body">
        <dl class="detail-info-list">
          <dt>Empresa</dt><dd>EMPAS S.A.</dd>
          <dt>Sector</dt><dd>Agua Potable</dd>
          <dt>Valor</dt><dd style="color: var(--accent); font-weight: 700;">$ 485.000.000</dd>
          <dt>Fecha inicio</dt><dd>01 Mar 2026</dd>
          <dt>Fecha fin</dt><dd>30 Ago 2026</dd>
          <dt>Duración</dt><dd>6 meses</dd>
          <dt>Responsable</dt><dd>Juan Pérez</dd>
          <dt>Oportunidad</dt><dd><a href="04-oportunidad-detalle.html" style="color: var(--primary); text-decoration: none;">OPP-2025-0042</a></dd>
        </dl>
      </div>
    </div>
  `;

  return `
    <div class="content">
      ${header}
      <div style="display: grid; gap: 16px; grid-template-columns: 1fr 320px;">
        ${progress}
        ${info}
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `${renderSidebar('proyectos','ejecutivo')}<div class="main-area">${renderTopbar({breadcrumb:['Proyectos','Detalle']})}${detailContent()}</div>`;
</script>
</body>
</html>
