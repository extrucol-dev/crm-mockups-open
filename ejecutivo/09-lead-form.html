<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Lead Form</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 40px; }

  .form-card { max-width: 672px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow-sm); }
  .form-section { padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .form-section:last-child { border-bottom: none; }
  .form-section__title { font-size: 13px; font-weight: 700; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .form-section__title .icon { color: var(--primary); }
  .form-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .form-grid-full { grid-column: 1 / -1; }

  .interes-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 999px;
    border: 1px solid var(--border-input);
    background: var(--surface); font-size: 12.5px;
    font-weight: 600; color: var(--text-secondary);
    cursor: pointer; transition: all 180ms;
  }
  .interes-chip:hover { border-color: var(--primary); }
  .interes-chip.is-selected { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }
  .interes-chip.is-selected::before { content: '✓'; font-weight: 700; }

  .origen-option {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 14px 10px; border-radius: 8px;
    border: 1px solid var(--border); cursor: pointer;
    transition: all 180ms; text-align: center;
  }
  .origen-option:hover { border-color: var(--primary); background: var(--primary-bg); }
  .origen-option.is-selected { border-color: var(--primary); background: var(--primary-bg); }
  .origen-option__icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--page-bg); color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
  }
  .origen-option.is-selected .origen-option__icon { background: var(--primary); color: #fff; }
  .origen-option__label { font-size: 11.5px; font-weight: 600; color: var(--text-secondary); }
  .origen-option.is-selected .origen-option__label { color: var(--primary); }

  .score-selector {
    display: flex; gap: 10px; align-items: stretch;
  }
  .score-card {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 14px 8px 10px; border-radius: 10px;
    border: 2px solid var(--border); cursor: pointer;
    background: var(--surface); transition: all 200ms;
    position: relative; overflow: hidden;
  }
  .score-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .score-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .score-card.is-selected { border-color: var(--primary); background: var(--primary-bg); }
  .score-card__n {
    width: 32px; height: 32px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
    font-size: 15px; font-weight: 800; margin-bottom: 6px;
  }
  .score-card__label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.04em; margin-bottom: 4px;
  }
  .score-card__desc { font-size: 10px; color: var(--text-muted); text-align: center; }
  .score-card[data-score="20"]::before { background: #93C5FD; }
  .score-card[data-score="20"] .score-card__n { background: #EEF1FA; color: #24388C; }
  .score-card[data-score="40"]::before { background: #A5B4FC; }
  .score-card[data-score="40"] .score-card__n { background: #EEF1FA; color: #6366F1; }
  .score-card[data-score="60"]::before { background: #FCD34D; }
  .score-card[data-score="60"] .score-card__n { background: #FFF4E0; color: #C7770D; }
  .score-card[data-score="80"]::before { background: #FB923C; }
  .score-card[data-score="80"] .score-card__n { background: #FFF4E0; color: #EA580C; }
  .score-card[data-score="100"]::before { background: #4ADE80; }
  .score-card[data-score="100"] .score-card__n { background: #E8F5EE; color: #1A8754; }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
function content() {
  return `
    <div class="content">

        <div class="page-head">
          <div class="page-head__title-group">
            <div class="page-head__title">Nuevo Lead</div>
            <div class="page-head__subtitle">Registra un prospecto y sus intereses comerciales</div>
          </div>
        </div>
      <div class="form-card">
        <div class="form-section">
          <div class="form-section__title">${Icons.funnel} Información básica</div>
          <div class="form-grid-2" style="grid-template-columns: repeat(2, 1fr);">
            <div class="form-field form-grid-full">
              <label class="form-field__label">Título del lead <span class="req">*</span></label>
              <input class="input" value="Solicitud tubería PE100 para proyecto de alcantarillado" />
              <span class="form-field__hint">Un resumen breve de la necesidad del prospecto</span>
            </div>
            <div class="form-field form-grid-full">
              <label class="form-field__label">Descripción</label>
              <textarea class="textarea" rows="3">Cliente solicita cotización de tubería PE100 500mm PN10 para proyecto de alcantarillado en zona rural. Requiere visita técnica y cotización formal.</textarea>
            </div>
            <div class="form-field">
              <label class="form-field__label">Ejecutivo <span class="req">*</span></label>
              <select class="select">
                <option selected>Paola Martínez</option>
                <option>Juan Pérez</option>
                <option>Carolina Gómez</option>
                <option>Andrés Rojas</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-field__label">Estado inicial</label>
              <select class="select">
                ${renderLeadEstadoSelect('Nuevo')}
              </select>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section__title">${Icons.globe} Origen del lead</div>
          <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;">
            ${renderLeadOrigenOptions('web')}
          </div>
        </div>

        <div class="form-section">
          <div class="form-section__title">${Icons.building} Empresa y contacto</div>
          <div class="form-grid-2" style="grid-template-columns: repeat(2, 1fr);">
            <div class="form-field">
              <label class="form-field__label">Empresa</label>
              <input class="input" placeholder="Nombre de la empresa" />
            </div>
            <div class="form-field">
              <label class="form-field__label">Ciudad</label>
              <select class="select">
                <option>Cartagena</option>
                <option>Medellín</option>
                <option>Barranquilla</option>
                <option>Bogotá</option>
                <option>Cali</option>
                <option>Bucaramanga</option>
                <option>Piedecuesta</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-field__label">Nombre del contacto</label>
              <input class="input" placeholder="Nombre del contacto" />
            </div>
            <div class="form-field">
              <label class="form-field__label">Teléfono</label>
              <input class="input" placeholder="+57 300 000 0000" />
            </div>
            <div class="form-field form-grid-full">
              <label class="form-field__label">Email del contacto</label>
              <input class="input" type="email" placeholder="cliente@empresa.com" />
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section__title">${Icons.tag} Intereses</div>
          <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px;">Selecciona todos los productos o servicios de interés del lead</div>
          <div style="display: flex; flex-wrap: wrap; gap: 8px;">
            ${renderLeadInteresChips(['Tubería PE100', 'Accesorios PE'])}
          </div>
        </div>

        <div class="form-section">
          <div class="form-section__title">${Icons.fire} Scoring inicial</div>
          <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 14px;">Calificación prospectiva — ayuda a priorizar seguimiento</div>
          <div class="score-selector">
            ${renderLeadScore(60)}
          </div>
        </div>

        <div class="form-section" style="background: var(--page-bg);">
          <div class="form-actions" style="border-top: none; padding-top: 0; margin-top: 0;">
            <a href="03-leads-kanban.html" style="text-decoration: none;"><button class="btn btn--secondary">Cancelar</button></a>
            <button class="btn btn--primary">${Icons.check} Guardar lead</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `${renderSidebar('leads','ejecutivo')}<div class="main-area">${renderTopbar({breadcrumb:['Leads','Nuevo']})}${content()}</div>`;

document.querySelectorAll('.score-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.score-card').forEach(c => c.classList.remove('is-selected'));
    card.classList.add('is-selected');
  });
});

document.querySelectorAll('.origen-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.origen-option').forEach(o => o.classList.remove('is-selected'));
    opt.classList.add('is-selected');
  });
});

document.querySelectorAll('.interes-chip').forEach(chip => {
  chip.addEventListener('click', () => chip.classList.toggle('is-selected'));
});
</script>
</body>
</html>
