<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Detalle Actividad</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .activity-detail-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .activity-detail-header__icon-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .activity-detail-header__icon {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .activity-detail-header__title {
    font-size: 22px; font-weight: 800; color: var(--text-primary);
    letter-spacing: -0.02em; line-height: 1.2;
  }
  .activity-detail-header__sub {
    font-size: 13px; color: var(--text-muted); margin-top: 4px;
  }
  .activity-detail-meta {
    display: flex; gap: 24px; margin-top: 16px;
    padding-top: 16px; border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .activity-detail-meta__item { display: flex; flex-direction: column; gap: 2px; }
  .activity-detail-meta__label {
    font-size: 10.5px; font-weight: 600; color: var(--text-disabled);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .activity-detail-meta__value { font-size: 14px; font-weight: 600; color: var(--text-primary); }

  .activity-type-selector {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .activity-type-card {
    padding: 16px 8px; border: 1px solid var(--border);
    border-radius: 8px; text-align: center; cursor: pointer;
    transition: all 180ms; display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    background: var(--surface);
  }
  .activity-type-card:hover { border-color: var(--primary); }
  .activity-type-card.is-active {
    border-color: var(--primary); background: var(--primary-bg);
  }
  .activity-type-card__icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: var(--page-bg);
  }
  .activity-type-card.is-active .activity-type-card__icon {
    background: var(--primary); color: #fff;
  }
  .activity-type-card__label {
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
  }
  .activity-type-card.is-active .activity-type-card__label {
    color: var(--primary);
  }

  .big-map {
    height: 280px;
    border-radius: 8px;
    background-color: #E8EEF5;
    background-image:
      linear-gradient(rgba(36, 56, 140, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(36, 56, 140, 0.06) 1px, transparent 1px),
      radial-gradient(circle at 30% 40%, rgba(243, 150, 16, 0.1), transparent 50%);
    background-size: 24px 24px, 24px 24px, auto;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .map-main-pin {
    position: absolute;
    top: 45%; left: 50%;
    transform: translate(-50%, -100%);
    width: 36px; height: 36px;
    background: var(--primary);
    border: 4px solid #fff;
    border-radius: 50%;
    box-shadow: 0 4px 12px rgba(36, 56, 140, 0.4);
    z-index: 2;
  }
  .map-main-pin::after {
    content: '';
    position: absolute;
    left: 50%; bottom: -10px;
    transform: translateX(-50%);
    width: 2px; height: 10px;
    background: var(--primary);
  }
  .map-main-pin::before {
    content: '';
    position: absolute;
    inset: 6px;
    background: #fff;
    border-radius: 50%;
  }
  .pulse-ring {
    position: absolute;
    top: 45%; left: 50%;
    transform: translate(-50%, -100%);
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 2px solid var(--primary);
    opacity: 0.3;
    animation: pulse 2s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: translate(-50%, -100%) scale(0.5); opacity: 0.6; }
    100% { transform: translate(-50%, -100%) scale(2); opacity: 0; }
  }
  .gps-indicator {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(6px);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--success);
    display: flex; align-items: center; gap: 6px;
    box-shadow: var(--shadow-sm);
  }
  .gps-indicator::before {
    content: '';
    width: 8px; height: 8px;
    background: #22C55E;
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
    animation: blink 1.5s ease infinite;
  }
  @keyframes blink {
    50% { opacity: 0.4; }
  }
  .timeline-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .timeline-row:last-child { border-bottom: none; }
  .timeline-row__dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--primary); margin-top: 5px; flex-shrink: 0;
  }
  .timeline-row__dot--muted { background: var(--border); }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>

      </div>

  `;

  const sidePanel = `

  return `

document.getElementById('shell').innerHTML = `${renderSidebar('actividades', 'ejecutivo')}<div class="main-area">${renderTopbar({breadcrumb:['Actividades','Detalle']})}${detailContent()}</div>`;

</body>
</html>
