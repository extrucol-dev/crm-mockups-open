<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Detalle Actividad</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .activity-detail-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .activity-detail-header__icon-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .activity-detail-header__icon {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .activity-detail-header__title {
    font-size: 22px; font-weight: 800; color: var(--text-primary);
    letter-spacing: -0.02em; line-height: 1.2;
  }
  .activity-detail-header__sub {
    font-size: 13px; color: var(--text-muted); margin-top: 4px;
  }
  .activity-detail-meta {
    display: flex; gap: 24px; margin-top: 16px;
    padding-top: 16px; border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .activity-detail-meta__item { display: flex; flex-direction: column; gap: 2px; }
  .activity-detail-meta__label {
    font-size: 10.5px; font-weight: 600; color: var(--text-disabled);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .activity-detail-meta__value { font-size: 14px; font-weight: 600; color: var(--text-primary); }

  .activity-type-selector {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .activity-type-card {
    padding: 16px 8px; border: 1px solid var(--border);
    border-radius: 8px; text-align: center; cursor: pointer;
    transition: all 180ms; display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    background: var(--surface);
  }
  .activity-type-card:hover { border-color: var(--primary); }
  .activity-type-card.is-active {
    border-color: var(--primary); background: var(--primary-bg);
  }
  .activity-type-card__icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: var(--page-bg);
  }
  .activity-type-card.is-active .activity-type-card__icon {
    background: var(--primary); color: #fff;
  }
  .activity-type-card__label {
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
  }
.activity-type-card.is-active .activity-type-card__label {
    color: var(--primary);
  }

  .timeline-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .timeline-row:last-child { border-bottom: none; }
  .timeline-row__dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--primary); margin-top: 5px; flex-shrink: 0;
  }
  .timeline-row__dot--muted { background: var(--border); }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
function detailContent() {
  const header = `
    <div class="activity-detail-header">
      <div style="display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">
        <a href="07-actividades.html" style="color: var(--primary); cursor: pointer;">Actividades</a>
        <span>/</span>
        <span>ACT-2025-0156</span>
      </div>
      <div style="display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;">
        <div style="flex: 1;">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap;">
            <span class="badge badge--ganada"><span class="dot"></span> Completada</span>
            <span class="badge badge--info">${Icons.envelope.replace('class="icon"','class="icon icon--xs"')} Email</span>
            <span class="badge badge--neutral">No presencial</span>
          </div>
          <div class="activity-detail-header__title">Envío información técnica Sello FM - FIRELINE</div>
          <div class="activity-detail-header__sub">FIRELINE · 15 Jul 2025 · 3:00 PM</div>
        </div>
        <div style="display: flex; gap: 8px; flex-shrink: 0;">
          <button class="btn btn--secondary btn--sm">${Icons.pencil} Editar</button>
        </div>
      </div>
      <div class="activity-detail-meta">
        <div class="activity-detail-meta__item">
          <span class="activity-detail-meta__label">Fecha</span>
          <span class="activity-detail-meta__value">15 Jul 2025</span>
        </div>
        <div class="activity-detail-meta__item">
          <span class="activity-detail-meta__label">Hora</span>
          <span class="activity-detail-meta__value">3:00 PM</span>
        </div>
        <div class="activity-detail-meta__item">
          <span class="activity-detail-meta__label">Tipo</span>
          <span class="activity-detail-meta__value">Email</span>
        </div>
        <div class="activity-detail-meta__item">
          <span class="activity-detail-meta__label">Ejecutivo</span>
          <span class="activity-detail-meta__value">Paola</span>
        </div>
      </div>
    </div>
  `;

  const mainContent = `
    <div style="display: flex; flex-direction: column; gap: 16px; flex: 1; min-width: 0;">

      <div class="card">
        <div class="card__header">
          <div class="card__title">Datos de la actividad</div>
        </div>
        <div class="card__body" style="display: flex; flex-direction: column; gap: 12px;">
          <dl class="detail-info-list">
            <dt>Relacionado con</dt>
            <dd>Lead</dd>
            <dt>Lead</dt>
            <dd><a style="color: var(--primary); cursor: pointer;">Cotización proyecto RCI Seren del Mar</a></dd>
            <dt>Empresa</dt>
            <dd>FIRELINE</dd>
            <dt>Asunto</dt>
            <dd>Envío información técnica de sello FM y fichas técnicas</dd>
          </dl>
        </div>
      </div>

      <div class="card">
        <div class="card__header">
          <div class="card__title">Resultado</div>
          <span class="badge badge--ganada"><span class="dot"></span> Completada</span>
        </div>
        <div class="card__body">
          <div style="font-size: 14px; color: var(--text-primary); line-height: 1.6;">
            Se envió información técnica de sello FM y fichas técnicas al cliente FIRELINE.
            Cliente en proceso de revisión de documentación para decisión de compra.
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card__header">
          <div class="card__title">Actividades relacionadas</div>
        </div>
        <div class="card__body" style="padding: 12px 16px;">
          <div class="timeline-row">
            <div class="timeline-row__dot"></div>
            <div style="flex: 1; min-width: 0;">
              <div style="font-size: 13.5px; font-weight: 600; color: var(--text-primary);">Email - Cotización No. 20250626 enviada</div>
              <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">26 Jun 2025 · Completada</div>
            </div>
          </div>
          <div class="timeline-row">
            <div class="timeline-row__dot"></div>
            <div style="flex: 1; min-width: 0;">
              <div style="font-size: 13.5px; font-weight: 600; color: var(--text-primary);">Llamada - Seguimiento: compraron vía COSERINCO</div>
              <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">24 Sep 2025 · Completada · LEAD CERRADO</div>
            </div>
          </div>
          <div class="timeline-row">
            <div class="timeline-row__dot timeline-row__dot--muted"></div>
            <div style="flex: 1; min-width: 0;">
              <div style="font-size: 13.5px; font-weight: 600; color: var(--text-disabled);">Lead creado desde WhatsApp</div>
              <div style="font-size: 12px; color: var(--text-disabled); margin-top: 2px;">26 Jun 2025 · Completada</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  `;

  const sidePanel = `
    <div style="display: flex; flex-direction: column; gap: 12px; width: 300px; flex-shrink: 0;">

      <div class="card">
        <div class="card__header"><div class="card__title">Lead</div></div>
        <div class="card__body">
          <div style="font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px;">Cotización proyecto RCI Seren del Mar</div>
          <div style="font-size: 12.5px; color: var(--text-muted); margin-bottom: 10px;">FIRELINE · LEAD-2025-033</div>
          <a href="10-lead-detalle.html" style="text-decoration: none;">
            <button class="btn btn--secondary btn--sm btn--block">${Icons.arrowRight} Ver lead</button>
          </a>
        </div>
      </div>

      <div class="card">
        <div class="card__header"><div class="card__title">Contacto</div></div>
        <div class="card__body">
          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
            <div class="avatar avatar--color-2">ST</div>
            <div style="font-weight: 700; font-size: 13.5px;">Santiago Triana</div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 8px; font-size: 13px;">
            <a style="color: var(--primary); display: flex; align-items: center; gap: 6px; cursor: pointer;">${Icons.phone} +57 317 745 9833</a>
            <a style="color: var(--primary); display: flex; align-items: center; gap: 6px; cursor: pointer;">${Icons.envelope} ventas@fireline.com.co</a>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card__header"><div class="card__title">Información</div></div>
        <div class="card__body">
<dl class="detail-info-list">
            <dt>Creada</dt><dd>15 Jul 2025</dd>
            <dt>Registrada por</dt><dd>Paola</dd>
            <dt>ID</dt><dd>ACT-2025-0156</dd>
            <dt>Canal</dt><dd>Email</dd>
          </dl>
        </div>
      </div>

      <div class="card">
        <div class="card__header"><div class="card__title">Acciones</div></div>
        <div class="card__body" style="display: flex; flex-direction: column; gap: 8px;">
          <button class="btn btn--secondary btn--block">${Icons.pencil} Editar actividad</button>
          <button class="btn btn--secondary btn--block">${Icons.plus} Agregar nota</button>
        </div>
      </div>

    </div>
  `;

  return `
    <div class="content">
      ${header}
      <div style="display: flex; gap: 16px; align-items: flex-start;">
        ${mainContent}
        ${sidePanel}
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `${renderSidebar('actividades', 'ejecutivo')}<div class="main-area">${renderTopbar({breadcrumb:['Actividades','Detalle']})}${detailContent()}</div>`;
</script>
</body>
</html>
