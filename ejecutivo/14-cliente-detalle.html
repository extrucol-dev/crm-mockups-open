<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Clientes</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
    .modal-overlay {
    position: absolute; inset: 0;
    background: rgba(26,26,26,0.5);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 60px 24px; z-index: 10000;
  }
  .modal-content {
    background: var(--surface); border-radius: 12px;
    max-width: 580px; width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15); overflow: hidden;
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    gap: 12px;
  }
  .modal-header > :first-child { flex-shrink: 0; }
  .modal-header > :not(:first-child):not(:last-child) { flex: 1; }
  .modal-header__icon--success { background: var(--success-bg); color: var(--success); }
  .modal-header__icon--error { background: var(--error-bg); color: var(--error); }
  .modal-header__icon--primary { background: var(--primary-bg); color: var(--primary); }
  .modal-header__icon--accent { background: var(--accent-bg); color: var(--accent); }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 10px; background: var(--page-bg);
  }
  .dropdown-item {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 10px 12px;
    background: none; border: none;
    font-family: inherit; font-size: 13.5px; font-weight: 500;
    color: var(--text-primary);
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    transition: background 150ms;
  }
  .dropdown-item:hover { background: var(--page-bg); }
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 24px; }
  .canvas-section-title { font: 700 15px 'Roboto'; color: #24388C; margin: 40px 0 20px; padding: 8px 14px; background: #fff; border: 1px solid #E5E5E5; border-radius: 6px; display: inline-block; }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
window.modalRoot = document.getElementById('shell');

function openModal(html) { modalRoot.innerHTML += html; }
function closeModal() {
  const overlays = document.querySelectorAll('.modal-overlay');
  if (overlays.length > 0) overlays[overlays.length - 1].remove();
}

function editarClienteModal() {
  return `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-content" style="max-width: 580px;">
        <div class="modal-header">
          <div class="modal-header__icon" style="background: var(--primary-bg); color: var(--primary);">${Icons.pencil}</div>
          <div>
            <div style="font-weight: 700; font-size: 16px;">Editar cliente</div>
            <div style="font-size: 12.5px; color: var(--text-muted);">EMPAS S.A.</div>
          </div>
          <button class="topbar__icon-btn" onclick="closeModal()">${Icons.close}</button>
        </div>
        <div class="modal-body">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px;">
            <div class="form-field">
              <label class="form-field__label">Tipo de documento</label>
              <select class="select">
                <option selected>NIT</option>
                <option>Cédula de ciudadanía</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-field__label">Número de documento</label>
              <input class="input" value="890.200.341-2" />
            </div>
          </div>
          <div class="form-field" style="margin-bottom: 14px;">
            <label class="form-field__label">Nombre / Razón social</label>
            <input class="input" value="EMPAS S.A." />
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px;">
            <div class="form-field">
              <label class="form-field__label">Estado</label>
              <select class="select">
                <option selected>Activo</option>
                <option>Inactivo</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-field__label">Departamento</label>
              <input class="input" value="Santander" />
            </div>
          </div>
          <div class="form-field" style="margin-bottom: 14px;">
            <label class="form-field__label">Municipio</label>
            <input class="input" value="Piedecuesta" />
          </div>
          <div class="form-field" style="margin-bottom: 14px;">
            <label class="form-field__label">Dirección</label>
            <input class="input" placeholder="Dirección comercial" />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn--secondary" onclick="closeModal()">Cancelar</button>
          <button class="btn btn--primary" onclick="closeModal()">${Icons.check} Guardar cambios</button>
        </div>
      </div>
    </div>
  `;
}
