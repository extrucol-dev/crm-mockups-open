<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Detalle Lead + Conversión</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 24px; }
  .canvas-section-title { font: 700 15px 'Roboto'; color: #24388C; margin: 40px 0 20px; padding: 8px 14px; background: #fff; border: 1px solid #E5E5E5; border-radius: 6px; display: inline-block; }

  .modal-overlay {
    position: absolute; inset: 0;
    background: rgba(26,26,26,0.5);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 60px 24px;
    z-index: 100;
  }
  .modal-content {
    background: var(--surface);
    border-radius: 12px;
    max-width: 560px; width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    overflow: hidden;
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header__icon {
    width: 40px; height: 40px;
    background: var(--success-bg); color: var(--success);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    margin-right: 12px;
  }
  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; background: var(--page-bg); }

  .convert-preview {
    background: var(--page-bg);
    border: 1px dashed var(--primary);
    border-radius: 8px;
    padding: 14px;
    margin-top: 12px;
  }
  .convert-arrow {
    display: flex; align-items: center; justify-content: center;
    padding: 12px;
    color: var(--primary);
  }
  .convert-arrow svg { width: 24px; height: 24px; }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>
  </div>
</div>

<script src="../shared/components.js"></script>
<script>
function conversionModal() {
  return `
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <div style="display: flex; align-items: center;">
            <div class="modal-header__icon">${Icons.arrowRight}</div>
            <div>
              <div style="font-weight: 700; font-size: 16px;">Convertir a oportunidad</div>
              <div style="font-size: 12.5px; color: var(--text-muted);">Crea una oportunidad comercial desde este lead</div>
            </div>
          </div>
          <button class="topbar__icon-btn">${Icons.close}</button>
        </div>
        <div class="modal-body">
          <div class="convert-preview">
            <div style="display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;">
              ${Icons.funnel.replace('class="icon"','class="icon icon--xs"')} Lead origen
            </div>
            <div style="font-weight: 700;">Suministro anual de tubería</div>
            <div style="font-size: 12px; color: var(--text-muted);">Constructora Bolívar · Score 86%</div>
          </div>

          <div class="convert-arrow">${Icons.chevronDown}</div>

          <div class="form-field" style="margin-bottom: 12px;">
            <label class="form-field__label">Título de la oportunidad <span class="req">*</span></label>
            <input class="input" value="Contrato anual - Constructora Bolívar 2026" />
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
            <div class="form-field">
              <label class="form-field__label">Tipo</label>
              <select class="select">
                <option>Suministro directo</option>
                <option>Licitación</option>
                <option>Proyecto a medida</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-field__label">Valor estimado (COP)</label>
              <input class="input" value="$ 560.000.000" />
            </div>
            <div class="form-field">
              <label class="form-field__label">Fecha cierre estimada</label>
              <input class="input" type="date" value="2026-05-30" />
            </div>
            <div class="form-field">
              <label class="form-field__label">Estado inicial</label>
              <select class="select">
                <option selected>Prospección</option>
                <option>Calificación</option>
              </select>
            </div>
          </div>

          <div class="alert alert--info">
            ${Icons.sparkles}
            <div>
              Se creará una nueva oportunidad y este lead se marcará como <strong>Trasladado a distribuidor</strong>.
              Los intereses del lead se usarán para pre-seleccionar productos.
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn--secondary">Cancelar</button>
          <button class="btn btn--primary">${Icons.check} Convertir a oportunidad</button>
        </div>
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `<div class="app-shell">${conversionModal()}</div>`;
</script>
</body>
</html>
