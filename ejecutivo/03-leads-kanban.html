<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Ejecutivo · Leads Kanban</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 40px; }

  .lead-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    box-shadow: var(--shadow-sm);
    cursor: grab;
    transition: all 180ms ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .lead-card:hover { border-color: var(--primary); box-shadow: var(--shadow-md); }
  .lead-card__origen {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-muted);
  }
  .lead-card__title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .lead-card__empresa { font-size: 11.5px; color: var(--text-muted); }
  .lead-card__intereses { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
  .lead-card__interes-chip {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 4px; background: var(--primary-bg); color: var(--primary);
  }
  .lead-card__footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 8px; border-top: 1px solid var(--border); margin-top: 2px;
  }
  .lead-card__score {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; font-weight: 700; color: var(--accent);
  }
  .lead-card__age { font-size: 10.5px; color: var(--text-disabled); }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
window.modalRoot = document.getElementById('shell');
function openModal(html) { modalRoot.innerHTML += html; }
function closeModal() {
  const overlays = document.querySelectorAll('.modal-overlay');
  if (overlays.length > 0) overlays[overlays.length - 1].remove();
}

function toggleFiltros() {
  const panel = document.getElementById('filtrosPanel');
  if (panel.style.display === 'none') {
    panel.style.display = 'flex';
  } else {
    panel.style.display = 'none';
  }
}

const leadsData = {
  NUEVO: { color: '#3B82F6', label: 'Nuevo', badgeClass: 'prospecto', items: [
    { titulo: 'Solicitud cotización tubería para alcantarillado', empresa: 'RB DE COLOMBIA SA', origen: 'WhatsApp', intereses: ['Tubería PE'], score: 60, age: '1d', avatar: 'DC', color: 3 },
    { titulo: 'Oferta tubería PE100 para proyecto VIS', empresa: 'INGEOMEGA', origen: 'WhatsApp', intereses: ['Tubería PE', 'Accesorios'], score: 100, age: '2d', avatar: 'DI', color: 1 },
    { titulo: 'Cotización tubería 315mm PN10 para vivienda', empresa: 'GAMO INGENIEROS SAS', origen: 'WhatsApp', intereses: ['Tubería PE'], score: 60, age: '0d', avatar: 'GA', color: 5 },
  ]},
  CONTACTADO: { color: '#A855F7', label: 'Contactado', badgeClass: 'propuesta', items: [
    { titulo: 'Oferta equipo termofusión 160mm', empresa: 'MONTAJES JM', origen: 'WhatsApp', intereses: ['Equipos'], score: 80, age: '4d', avatar: 'MJ', color: 4 },
    { titulo: 'Propuesta accesorios para Manizales', empresa: 'CMM', origen: 'WhatsApp', intereses: ['Tubería PE', 'Accesorios'], score: 80, age: '5d', avatar: 'CM', color: 2 },
    { titulo: 'Oferta tubería para proyecto Santa Elena', empresa: 'CONSORCIO ING SANTA ELENA PM', origen: 'WhatsApp', intereses: ['Tubería PE'], score: 100, age: '3d', avatar: 'CS', color: 3 },
  ]},
  INTERESADO: { color: '#F39610', label: 'Interesado', badgeClass: 'calificacion', items: [
    { titulo: 'Cotización No 1393 tubería 110mm RDE 17', empresa: 'CIVILE HIDRAULICOS', origen: 'WhatsApp', intereses: ['Tubería PE'], score: 100, age: '6d', avatar: 'CH', color: 6 },
    { titulo: 'Cotización No 1248 proyecto Imola Park', empresa: 'Promotora Imola Park S.A.S', origen: 'WhatsApp', intereses: ['Tubería PE', 'Accesorios'], score: 100, age: '8d', avatar: 'PI', color: 1 },
    { titulo: 'Oferta para licitador municipio Apartadó', empresa: 'ADOS INGENIERIA', origen: 'Instagram', intereses: ['Tubería PE'], score: 80, age: '7d', avatar: 'AD', color: 4 },
  ]},
  TRASLADADO: { color: '#22C55E', label: 'Trasladado a distribuidor', badgeClass: 'ganada', items: [
    { titulo: 'Cotización No 584 proyecto Sabanalarga', empresa: 'COL PROYECTOS', origen: 'WhatsApp', intereses: ['Tubería PE', 'Accesorios'], score: 100, age: '10d', avatar: 'CP', color: 5 },
    { titulo: 'Cotización No 20250626 proyecto RCI Seren del Mar', empresa: 'FIRELINE', origen: 'WhatsApp', intereses: ['Tubería PE', 'Accesorios'], score: 100, age: '12d', avatar: 'FL', color: 2 },
  ]},
  DESCALIFICADO: { color: '#EF4444', label: 'No Interesado', badgeClass: 'perdida', items: [
    { titulo: 'Proyecto alcantarillado EMSERPRE', empresa: 'EMSERPRE', origen: 'Instagram', intereses: ['Tubería PE', 'Accesorios'], score: 20, age: '15d', avatar: 'EM', color: 3 },
    { titulo: 'Tubería HDPE para San Marcos Sucre', empresa: 'GEOCOR', origen: 'WhatsApp', intereses: ['Tubería PE'], score: 20, age: '20d', avatar: 'GE', color: 6 },
  ]}
};

function renderLeadCard(l, estadoKey) {
  const s = leadsData[estadoKey];
  return `
    <a href="10-lead-detalle.html" style="text-decoration: none; color: inherit; font: inherit; cursor: pointer;">
      <div class="lead-card">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <span class="lead-card__origen">${Icons.globe} ${l.origen}</span>
          <button class="topbar__icon-btn" style="width:24px; height:24px;">${Icons.dots}</button>
        </div>
        <div class="lead-card__title">${l.titulo}</div>
        <div class="lead-card__empresa">${l.empresa}</div>
        <div class="lead-card__intereses">
          ${l.intereses.map(i => `<span class="lead-card__interes-chip">${i}</span>`).join('')}
        </div>
        <div class="lead-card__footer">
          <div style="display: flex; align-items: center; gap: 8px;">
            <div class="avatar avatar--xs avatar--color-${l.color}">${l.avatar}</div>
            <span class="lead-card__score">${Icons.fire} ${l.score}%</span>
          </div>
          <span class="lead-card__age">${l.age}</span>
        </div>
      </div>
    </a>
  `;
}

function renderKanbanColumn(estadoKey) {
  const col = leadsData[estadoKey];
  const cards = col.items.map(l => renderLeadCard(l, estadoKey)).join('');
  return `
    <div class="kanban-col">
      <div class="kanban-col__header">
        <span class="kanban-col__dot" style="background:${col.color}"></span>
        <span class="kanban-col__label">${col.label}</span>
        <span class="kanban-col__count">${col.items.length}</span>
      </div>
      <div class="kanban-col__line" style="background:${col.color}"></div>
      <div class="kanban-col__list">
        ${cards || `<div class="kanban-col__empty">Sin leads</div>`}
      </div>
    </div>
  `;
}

function content() {
  const total = Object.values(leadsData).reduce((a,b)=>a+b.items.length, 0);
  const columnasKanban = `<div class="kanban" style="grid-template-columns: repeat(5, 1fr);">
       ${renderKanbanColumn('NUEVO')}
       ${renderKanbanColumn('CONTACTADO')}
       ${renderKanbanColumn('INTERESADO')}
       ${renderKanbanColumn('TRASLADADO')}
       ${renderKanbanColumn('DESCALIFICADO')}
     </div>`;

  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Mis Leads</div>
          <div class="page-head__subtitle">${total} leads en seguimiento · 2 sin contactar hace +2 días</div>
        </div>
        <div class="page-head__actions">
          <button class="btn btn--secondary btn--sm" onclick="toggleFiltros()">${Icons.filter} Filtros</button>
          <a href="09-lead-form.html" style="text-decoration: none; color: inherit; font: inherit; cursor: pointer;">
            <button class="btn btn--primary btn--sm">${Icons.plus} Nuevo lead</button>
          </a>
        </div>
      </div>

      <div class="filter-bar">
        <div class="input-wrapper" style="flex:1; max-width: 320px;">
          ${Icons.search}
          <input class="input input--with-icon" placeholder="Buscar por título, empresa, origen...">
        </div>
        <select class="select" style="max-width: 180px;">
          <option>Todos los orígenes</option>
          <option>Instagram</option>
          <option>Facebook</option>
          <option>WhatsApp</option>
        </select>
        <select class="select" style="max-width: 180px;">
          <option>Todos los intereses</option>
          <option>Tubería PE</option>
          <option>Riego</option>
          <option>Accesorios</option>
        </select>
      </div>

      <div id="filtrosPanel" style="display: none; gap: 12px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: flex-end;">
        <div style="flex: 1; min-width: 200px;">
          <div style="font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;">Rango de score</div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input class="input" placeholder="Min" style="max-width: 80px;" />
            <span style="color: var(--text-muted);">—</span>
            <input class="input" placeholder="Max" style="max-width: 80px;" />
          </div>
        </div>
        <div style="flex: 1; min-width: 200px;">
          <div style="font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;">Antigüedad</div>
          <select class="select">
            <option>Cualquier edad</option>
            <option>Menos de 3 días</option>
            <option>3-7 días</option>
            <option>Más de 7 días</option>
          </select>
        </div>
        <div style="flex: 1; min-width: 200px;">
          <div style="font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;">Solo</div>
          <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <label style="display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer;">
              <input type="checkbox" style="width: 14px; height: 14px;" /> Sin contactar
            </label>
            <label style="display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer;">
              <input type="checkbox" style="width: 14px; height: 14px;" /> Alta prioridad
            </label>
          </div>
        </div>
        <button class="btn btn--ghost btn--sm" onclick="toggleFiltros()">${Icons.close} Cerrar</button>
      </div>

      <div class="alert alert--warning" style="margin-bottom: 16px;">
        ${Icons.warning}
        <div>
          <strong>1 lead estancado.</strong> GAMO INGENIEROS SAS sin contactar hace 1 día.
          El sistema enviará notificación al coordinador si superan 3 días.
        </div>
      </div>

      ${columnasKanban}
    </div>
  `;
}

document.getElementById('shell').innerHTML = `
  ${renderSidebar('leads', 'ejecutivo')}
  <div class="main-area">${renderTopbar({ title: 'Mis Leads' })}${content()}</div>
`;
</script>
</body>
</html>
