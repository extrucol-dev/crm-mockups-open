<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Admin · Forms y Detalles</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-title { font: 800 22px 'Roboto'; color: #1A1A1A; margin-bottom: 6px; }
  .canvas-subtitle { font: 400 14px 'Roboto'; color: #6B6B6B; margin-bottom: 24px; }
  .canvas-section-title { font: 700 15px 'Roboto'; color: #24388C; margin: 40px 0 20px; padding: 8px 14px; background: #fff; border: 1px solid #E5E5E5; border-radius: 6px; display: inline-block; }


  .role-selector {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  }
  .role-option {
    padding: 14px; border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; transition: all 180ms;
    background: var(--surface);
  }
  .role-option:hover { border-color: var(--primary); }
  .role-option.is-active { border-color: var(--primary); background: var(--primary-bg); }
  .role-option__title { font-weight: 700; color: var(--text-primary); font-size: 13.5px; margin-bottom: 2px; }
  .role-option__desc { font-size: 11.5px; color: var(--text-muted); }

  .perm-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .perm-row:last-child { border-bottom: none; }

  .diff-block {
    background: var(--page-bg);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 12px;
    border-left: 3px solid var(--border);
  }
  .diff-block--old {
    background: #FDECEA;
    border-left-color: var(--error);
    color: #7a2219;
  }
  .diff-block--new {
    background: #E8F5EE;
    border-left-color: var(--success);
    color: #0f5f3a;
  }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>
</div>

<script src="../shared/components.js"></script>
<script>
document.getElementById('shell').innerHTML = `${renderSidebar('usuarios','admin')}<div class="main-area">${renderTopbar({breadcrumb:['Usuarios','Nuevo']})}${userFormContent('desktop')}</div>`;
</script>
</body>
</html>
