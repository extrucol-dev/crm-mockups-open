<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Coordinador · Monitoreo y Notificaciones</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-section-title { font: 700 15px 'Roboto'; color: #24388C; margin: 40px 0 20px; padding: 8px 14px; background: #fff; border: 1px solid #E5E5E5; border-radius: 6px; display: inline-block; }

  .big-map {
    height: 480px;
    border-radius: 12px;
    background-color: #E8EEF5;
    background-image:
      linear-gradient(rgba(36, 56, 140, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(36, 56, 140, 0.08) 1px, transparent 1px),
      radial-gradient(circle at 25% 30%, rgba(243, 150, 16, 0.18), transparent 40%),
      radial-gradient(circle at 75% 70%, rgba(36, 56, 140, 0.15), transparent 40%);
    background-size: 28px 28px, 28px 28px, auto, auto;
    position: relative; overflow: hidden;
    border: 1px solid var(--border);
  }
  .map-pin {
    position: absolute;
    width: 26px; height: 26px;
    background: var(--primary);
    border: 3px solid #fff;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 700;
  }
  .map-pin--accent { background: var(--accent); }
  .map-pin--success { background: var(--green-bright); }
  .map-pin--error { background: var(--error); }
  .map-legend {
    position: absolute;
    top: 16px; left: 16px;
    background: #fff;
    padding: 12px;
    border-radius: 8px;
    box-shadow: var(--shadow-md);
    font-size: 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .map-stats {
    position: absolute;
    top: 16px; right: 16px;
    background: #fff;
    padding: 14px 18px;
    border-radius: 8px;
    box-shadow: var(--shadow-md);
    display: flex; gap: 20px;
  }
  .map-stats__item { text-align: center; }
  .map-stats__value { font-size: 20px; font-weight: 800; color: var(--primary); }
  .map-stats__label { font-size: 10.5px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }

  .notif-item {
    display: grid; grid-template-columns: auto 1fr auto; gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .notif-icon {
    width: 38px; height: 38px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .notif-icon--error { background: #FDECEA; color: var(--error); }
  .notif-icon--warning { background: #FFF8E5; color: #B87E15; }
  .notif-icon--info { background: var(--primary-bg); color: var(--primary); }
  .notif-icon--success { background: #E8F5EE; color: var(--success); }

  .compliance-mini {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px; position: relative;
  }
  .compliance-mini::before { content: ''; position: absolute; inset: 3px; background: #fff; border-radius: 50%; }
  .compliance-mini > span { position: relative; z-index: 1; }
  .modal-overlay {
    position: absolute; inset: 0;
    background: rgba(26,26,26,0.5);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 60px 24px;
    z-index: 100;
  }
  .modal-content {
    background: var(--surface);
    border-radius: 12px;
    max-width: 520px; width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    overflow: hidden;
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 10px;
    background: var(--page-bg);
  }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>
  </div>
</div>

<script src="../shared/components.js"></script>
<script>
window.modalRoot = document.getElementById('modal-root');

function verDetalleModal(notif) {
  modalRoot.innerHTML = `
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <div style="display:flex;align-items:center;">
            <div style="width:40px;height:40px;border-radius:10px;background:var(--primary-bg);color:var(--primary);display:flex;align-items:center;justify-content:center;margin-right:12px;">${Icons[notif.icon]}</div>
            <div>
              <div style="font-weight:700;font-size:16px;">${notif.title}</div>
              <div style="font-size:12.5px;color:var(--text-muted);">${notif.time}</div>
            </div>
          </div>
          <button class="topbar__icon-btn" onclick="closeModal()">${Icons.close}</button>
        </div>
        <div class="modal-body">
          <dl class="detail-info-list" style="margin-bottom:16px;">
            <dt>Destinatario</dt><dd>${notif.to}</dd>
            <dt>Canal</dt><dd>${notif.via}</dd>
            <dt>Estado</dt><dd><span class="badge badge--${notif.tipo === 'error' ? 'perdida' : notif.tipo === 'warning' ? 'calificacion' : 'info'}">${notif.tipo}</span></dd>
            <dt>Fecha</dt><dd>${notif.time}</dd>
          </dl>
          <div style="background:var(--page-bg);border:1px solid var(--border);border-radius:8px;padding:14px;">
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;">Contenido del mensaje</div>
            <div style="font-size:13.5px;color:var(--text-primary);">${notif.subtitle}</div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn--secondary" onclick="closeModal()">Cerrar</button>
          <button class="btn btn--primary">${Icons.send} Reenviar notificación</button>
        </div>
      </div>
    </div>
  `;
}

function closeModal() {
  modalRoot.innerHTML = '';
}

function notifContent() {
  const notificaciones = [
    { tipo: 'error', icon: 'warning', title: 'Alerta: Lead estancado 5 días', subtitle: 'HyM Contratistas Sas sin contactar. Asesor: Paola', to: 'Paola', via: 'Email', time: 'Hace 10 min', canal: 'email' },
    { tipo: 'warning', icon: 'clock', title: 'Oportunidad sin actividad - CIVILE Hidráulicos', subtitle: 'Cotización No. 1393 sin seguimiento hace 14 días', to: 'Paola', via: 'Email', time: 'Hace 1h', canal: 'email' },
    { tipo: 'error', icon: 'warning', title: 'Escalamiento: UT Balsa 3 sin avance', subtitle: 'Oportunidad de $187M sin actividad hace 6 días', to: 'Alvaro', via: 'Email', time: 'Hace 2h', canal: 'email' },
    { tipo: 'warning', icon: 'clock', title: 'GMOS INGENIEROS SAS - Sin interés', subtitle: 'Lead cerrado. El cliente requiere tubería AC Clase 10, no aplica.', to: 'Diana', via: 'Email', time: 'Hace 5h', canal: 'email' },
    { tipo: 'info', icon: 'bell', title: 'Oportunidad ganada - FIRELINE', subtitle: 'Lead cerrado. Cliente compró a través de COSERINCO.', to: 'Paola', via: 'Email', time: 'Ayer 14:00', canal: 'email' },
    { tipo: 'info', icon: 'bell', title: 'Seguimiento Cotización No. 584 - COL PROYECTOS', subtitle: 'Se actualizó cotización con cambio de cantidad.', to: 'Paola', via: 'Email', time: 'Ayer 10:30', canal: 'email' },
    { tipo: 'error', icon: 'warning', title: 'Proceso ADOS Ingeniería sin adjudicar', subtitle: 'Seguimiento: el municipio aún no adjudica el proyecto.', to: 'Diana', via: 'Email', time: 'Ayer 09:00', canal: 'email' },
    { tipo: 'warning', icon: 'clock', title: 'Lead EMSERPRE - Sin interés', subtitle: 'Cliente requiere tubería HDPE corrugada, no aplicamos.', to: 'Alexis', via: 'Email', time: 'Hace 2 días', canal: 'email' },
  ];

  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Log de notificaciones</div>
          <div class="page-head__subtitle">${notificaciones.length} notificaciones recientes · Últimas 48h</div>
        </div>
        <div class="page-head__actions">
          <a href="02-variables-sistema.html" style="text-decoration: none;"><button class="btn btn--secondary btn--sm">${Icons.adjustments} Configurar alertas</button></a>
          <button class="btn btn--secondary btn--sm">${Icons.download} Exportar</button>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;">
        <div class="stat-card">
          <div class="stat-card__icon" style="background: #FDECEA; color: var(--error);">${Icons.warning}</div>
          <div class="stat-card__label">Alertas críticas</div>
          <div class="stat-card__value" style="color: var(--error);">3</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--accent">${Icons.clock}</div>
          <div class="stat-card__label">Advertencias</div>
          <div class="stat-card__value stat-card__value--accent">2</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">${Icons.envelope}</div>
          <div class="stat-card__label">Emails enviados</div>
          <div class="stat-card__value">48</div>
          <div class="stat-card__subtext">Esta semana</div>
        </div>
      </div>

      <div class="filter-bar">
        <div class="input-wrapper" style="flex:1; max-width: 320px;">
          ${Icons.search}<input class="input input--with-icon" placeholder="Buscar en notificaciones...">
        </div>
        <select class="select" style="max-width: 160px;">
          <option>Todos los tipos</option>
          <option>Alertas críticas</option>
          <option>Advertencias</option>
          <option>Información</option>
        </select>
        <select class="select" style="max-width: 180px;">
          <option>Todos los destinatarios</option>
        </select>
      </div>

      <div class="card" style="padding: 0;">
        ${notificaciones.map(n => `
          <div class="notif-item">
            <div class="notif-icon notif-icon--${n.tipo}">${Icons[n.icon]}</div>
            <div>
              <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 2px; flex-wrap: wrap;">
                <span style="font-weight: 600; color: var(--text-primary); font-size: 13.5px;">${n.title}</span>
                <span class="badge badge--${n.canal === 'email' ? 'info' : 'accent'}" style="font-size: 10px;">
                  ${n.canal === 'email' ? Icons.envelope.replace('icon"','icon icon--xs"') : Icons.bell.replace('icon"','icon icon--xs"')}
                  ${n.via}
                </span>
              </div>
              <div style="font-size: 12.5px; color: var(--text-muted); margin-bottom: 4px;">${n.subtitle}</div>
              <div style="font-size: 11.5px; color: var(--text-disabled);">
                Para: <strong style="color: var(--text-secondary);">${n.to}</strong> · ${n.time}
              </div>
            </div>
            <button class="btn btn--ghost btn--sm" onclick='verDetalleModal(${JSON.stringify(n).replace(/'/g, "\\'")})'>${Icons.view}</button>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `
  ${renderSidebar('notificaciones', 'coordinador')}
  <div class="main-area">
    ${renderTopbar({ title: 'Notificaciones' })}
    ${notifContent()}
  </div>
`;
</script>
</body>
</html>
