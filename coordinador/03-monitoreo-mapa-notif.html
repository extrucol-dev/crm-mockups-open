<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Coordinador · Monitoreo y Notificaciones</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .canvas-section-title { font: 700 15px 'Roboto'; color: #24388C; margin: 40px 0 20px; padding: 8px 14px; background: #fff; border: 1px solid #E5E5E5; border-radius: 6px; display: inline-block; }

  .big-map {
    height: 480px;
    border-radius: 12px;
    background-color: #E8EEF5;
    background-image:
      linear-gradient(rgba(36, 56, 140, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(36, 56, 140, 0.08) 1px, transparent 1px),
      radial-gradient(circle at 25% 30%, rgba(243, 150, 16, 0.18), transparent 40%),
      radial-gradient(circle at 75% 70%, rgba(36, 56, 140, 0.15), transparent 40%);
    background-size: 28px 28px, 28px 28px, auto, auto;
    position: relative; overflow: hidden;
    border: 1px solid var(--border);
  }
  .map-pin {
    position: absolute;
    width: 26px; height: 26px;
    background: var(--primary);
    border: 3px solid #fff;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 700;
  }
  .map-pin--accent { background: var(--accent); }
  .map-pin--success { background: var(--green-bright); }
  .map-pin--error { background: var(--error); }
  .map-legend {
    position: absolute;
    top: 16px; left: 16px;
    background: #fff;
    padding: 12px;
    border-radius: 8px;
    box-shadow: var(--shadow-md);
    font-size: 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .map-stats {
    position: absolute;
    top: 16px; right: 16px;
    background: #fff;
    padding: 14px 18px;
    border-radius: 8px;
    box-shadow: var(--shadow-md);
    display: flex; gap: 20px;
  }
  .map-stats__item { text-align: center; }
  .map-stats__value { font-size: 20px; font-weight: 800; color: var(--primary); }
  .map-stats__label { font-size: 10.5px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }

  .notif-item {
    display: grid; grid-template-columns: auto 1fr auto; gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .notif-icon {
    width: 38px; height: 38px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .notif-icon--error { background: #FDECEA; color: var(--error); }
  .notif-icon--warning { background: #FFF8E5; color: #B87E15; }
  .notif-icon--info { background: var(--primary-bg); color: var(--primary); }
  .notif-icon--success { background: #E8F5EE; color: var(--success); }

  .compliance-mini {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px; position: relative;
  }
  .compliance-mini::before { content: ''; position: absolute; inset: 3px; background: #fff; border-radius: 50%; }
  .compliance-mini > span { position: relative; z-index: 1; }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
window.modalRoot = document.getElementById('modal-root');

function verDetalleModal(notif) {
  modalRoot.innerHTML = `
    <div class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <div style="display:flex;align-items:center;">

            <div>
              <div style="font-weight:700;font-size:16px;">${notif.title}</div>
              <div style="font-size:12.5px;color:var(--text-muted);">${notif.time}</div>
            </div>
          </div>
          <button class="topbar__icon-btn" onclick="closeModal()">${Icons.close}</button>
        </div>
        <div class="modal-body">
          <dl class="detail-info-list" style="margin-bottom:16px;">
            <dt>Destinatario</dt><dd>${notif.to}</dd>
            <dt>Canal</dt><dd>${notif.via}</dd>
            <dt>Estado</dt><dd><span class="badge badge--${notif.tipo === 'error' ? 'perdida' : notif.tipo === 'warning' ? 'calificacion' : 'info'}">${notif.tipo}</span></dd>
            <dt>Fecha</dt><dd>${notif.time}</dd>
          </dl>
          <div style="background:var(--page-bg);border:1px solid var(--border);border-radius:8px;padding:14px;">
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;">Contenido del mensaje</div>
            <div style="font-size:13.5px;color:var(--text-primary);">${notif.subtitle}</div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn--secondary" onclick="closeModal()">Cerrar</button>
          <button class="btn btn--primary">${Icons.send} Reenviar notificación</button>
        </div>
      </div>
    </div>
  `;
}

function closeModal() { modalRoot.innerHTML = ''; }

              </div>
              <div style="font-size: 12.5px; color: var(--text-muted); margin-bottom: 4px;">${n.subtitle}</div>
              <div style="font-size: 11.5px; color: var(--text-disabled);">
                Para: <strong style="color: var(--text-secondary);">${n.to}</strong> · ${n.time}
              </div>
            </div>
            <button class="btn btn--ghost btn--sm">${Icons.view}</button>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

  function tabContent(view) {
    if (view === 'mapa') return mapaContent();
    if (view === 'notif') return notifContent();
    return monitoreoContent();
  }

  let activeTab = 'monitoreo';

  document.getElementById('shell').innerHTML = `
    ${renderSidebar('monitoreo', 'coordinador')}
    <div class="main-area">
      ${renderTopbar({ title: 'Monitoreo' })}
      <div class="content">
        <div class="tabs">
          <button class="tab ${activeTab === 'monitoreo' ? 'is-active' : ''}" onclick="switchTab('monitoreo')">Monitoreo ejecutivos</button>
          <button class="tab ${activeTab === 'mapa' ? 'is-active' : ''}" onclick="switchTab('mapa')">Mapa actividades</button>
          <button class="tab ${activeTab === 'notif' ? 'is-active' : ''}" onclick="switchTab('notif')">Log notificaciones</button>
        </div>
        <div id="tab-content"></div>
      </div>
    </div>
  `;

  document.getElementById('tab-content').innerHTML = tabContent(activeTab);

  window.switchTab = function(view) {
    activeTab = view;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('is-active'));
    document.querySelector(`.tab:nth-child(${view === 'monitoreo' ? 1 : view === 'mapa' ? 2 : 3})`).classList.add('is-active');
    document.getElementById('tab-content').innerHTML = tabContent(view);
  };
</script>
</body>
</html>
