<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Coordinador · Monitoreo de Ejecutivos</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .compliance-mini {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px; position: relative;
  }
  .compliance-mini::before { content: ''; position: absolute; inset: 3px; background: #fff; border-radius: 50%; }
  .compliance-mini > span { position: relative; z-index: 1; }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
function monitoreoContent() {
  const ejecutivos = [
    { name: 'Juan Pérez', avatar: 'JP', color: 1, depto: 'Santander', comp: 85, ventas: '$ 385 M', opp: 12, leads: 8, act: 18, estancados: 2, sinActividad: 1, estado: 'green' },
    { name: 'María García', avatar: 'MG', color: 3, depto: 'Antioquia', comp: 92, ventas: '$ 420 M', opp: 9, leads: 5, act: 22, estancados: 0, sinActividad: 0, estado: 'green' },
    { name: 'Carlos Rodríguez', avatar: 'CR', color: 5, depto: 'Cundinamarca', comp: 62, ventas: '$ 180 M', opp: 6, leads: 10, act: 11, estancados: 4, sinActividad: 3, estado: 'yellow' },
    { name: 'Ana Martínez', avatar: 'AM', color: 4, depto: 'Valle del Cauca', comp: 78, ventas: '$ 260 M', opp: 11, leads: 7, act: 16, estancados: 1, sinActividad: 1, estado: 'green' },
    { name: 'Pedro Salazar', avatar: 'PS', color: 6, depto: 'Atlántico', comp: 48, ventas: '$ 95 M', opp: 5, leads: 4, act: 8, estancados: 3, sinActividad: 5, estado: 'red' },
    { name: 'Laura Jiménez', avatar: 'LJ', color: 2, depto: 'Santander', comp: 80, ventas: '$ 215 M', opp: 8, leads: 6, act: 14, estancados: 1, sinActividad: 0, estado: 'green' },
  ];

  const colorByEstado = { green: 'var(--success)', yellow: 'var(--accent)', red: 'var(--error)' };
  const badgeByEstado = { green: 'ganada', yellow: 'calificacion', red: 'perdida' };
  const labelByEstado = { green: 'Al día', yellow: 'Atención', red: 'Crítico' };

  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Monitoreo de ejecutivos</div>
          <div class="page-head__subtitle">Vista detallada del rendimiento · 6 ejecutivos monitoreados</div>
        </div>
        <div class="page-head__actions">
          <select class="select" style="max-width: 160px;">
            <option>Todos</option><option>Al día</option><option>Atención</option><option>Crítico</option>
          </select>
          <button class="btn btn--secondary btn--sm">${Icons.download} Exportar</button>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;">
        <div class="stat-card">
          <div class="stat-card__label">Al día</div>
          <div class="stat-card__value stat-card__value--success">${ejecutivos.filter(e => e.estado === 'green').length}</div>
          <div class="stat-card__subtext">De 6 ejecutivos</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Requieren atención</div>
          <div class="stat-card__value stat-card__value--accent">${ejecutivos.filter(e => e.estado === 'yellow').length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Estado crítico</div>
          <div class="stat-card__value" style="color: var(--error);">${ejecutivos.filter(e => e.estado === 'red').length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Total alertas</div>
          <div class="stat-card__value">${ejecutivos.reduce((a, e) => a + e.estancados + e.sinActividad, 0)}</div>
          <div class="stat-card__subtext">Leads + opps estancados</div>
        </div>
      </div>

      <div class="card" style="padding: 0;">
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>Ejecutivo</th>
                <th>Territorio</th>
                <th style="text-align: center;">Cumplim.</th>
                <th style="text-align: right;">Ventas mes</th>
                <th style="text-align: center;">Opp</th>
                <th style="text-align: center;">Leads</th>
                <th style="text-align: center;">Actividades</th>
                <th style="text-align: center;">Estancados</th>
                <th style="text-align: center;">Sin activ.</th>
                <th>Estado</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${ejecutivos.map(e => `
                <tr>
                  <td>
                    <div style="display: flex; align-items: center; gap: 10px;">
                      <div class="avatar avatar--sm avatar--color-${e.color}">${e.avatar}</div>
                      <div style="font-weight: 600; color: var(--text-primary);">${e.name}</div>
                    </div>
                  </td>
                  <td style="color: var(--text-muted); font-size: 12.5px;">${e.depto}</td>
                  <td>
                    <div style="display: flex; justify-content: center;">
                      <div class="compliance-mini" style="background: conic-gradient(${colorByEstado[e.estado]} ${e.comp}%, var(--border) ${e.comp}%);">
                        <span style="color: ${colorByEstado[e.estado]};">${e.comp}</span>
                      </div>
                    </div>
                  </td>
                  <td style="font-weight: 700; color: var(--accent); text-align: right;">${e.ventas}</td>
                  <td style="text-align: center; font-weight: 600;">${e.opp}</td>
                  <td style="text-align: center; font-weight: 600;">${e.leads}</td>
                  <td style="text-align: center; font-weight: 600;">${e.act}</td>
                  <td style="text-align: center; color: ${e.estancados > 2 ? 'var(--error)' : e.estancados > 0 ? 'var(--accent)' : 'var(--text-muted)'}; font-weight: 700;">${e.estancados}</td>
                  <td style="text-align: center; color: ${e.sinActividad > 2 ? 'var(--error)' : e.sinActividad > 0 ? 'var(--accent)' : 'var(--text-muted)'}; font-weight: 700;">${e.sinActividad}</td>
                  <td><span class="badge badge--${badgeByEstado[e.estado]}"><span class="dot"></span> ${labelByEstado[e.estado]}</span></td>
                  <td><a href="05-estancados.html" style="text-decoration: none; color: inherit;"><button class="table__action">${Icons.view}</button></a></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `
  ${renderSidebar('monitoreo', 'coordinador')}
  <div class="main-area">
    ${renderTopbar({ title: 'Monitoreo' })}
    <div id="tab-content"></div>
  </div>
`;

document.getElementById('tab-content').innerHTML = monitoreoContent();
</script>
</body>
</html>
