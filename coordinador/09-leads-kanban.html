<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SEGUIMIENTO Extrucol · Coordinador · Leads Kanban</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .lead-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    box-shadow: var(--shadow-sm);
    cursor: grab;
    transition: all 180ms ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .lead-card:hover { border-color: var(--primary); box-shadow: var(--shadow-md); }
  .lead-card__origen {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-muted);
  }
  .lead-card__title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .lead-card__empresa { font-size: 11.5px; color: var(--text-muted); }
  .lead-card__intereses { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
  .lead-card__interes-chip {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 4px; background: var(--primary-bg); color: var(--primary);
  }
  .lead-card__footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 8px; border-top: 1px solid var(--border); margin-top: 2px;
  }
  .lead-card__score {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; font-weight: 700; color: var(--accent);
  }
  .lead-card__age { font-size: 10.5px; color: var(--text-disabled); }
  .lead-card__asesor { font-size: 10.5px; color: var(--text-muted); font-weight: 600; }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
window.modalRoot = document.getElementById('shell');
function openModal(html) { modalRoot.innerHTML += html; }
function closeModal() {
  const overlays = document.querySelectorAll('.modal-overlay');
  if (overlays.length > 0) overlays[overlays.length - 1].remove();
}

function toggleFiltros() {
  const panel = document.getElementById('filtrosPanel');
  panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
}

const leadsData = {
NUEVO: { color: '#3B82F6', label: 'Nuevo', items: [
    { titulo: 'Solicitud cotización tubería para alcantarillado', empresa: 'RB DE COLOMBIA SA', origen: 'WhatsApp', intereses: ['Tubería PE'], score: 60, age: '1d', avatar: 'DC', color: 3, asesor: 'P. Martínez' },
    { titulo: 'Oferta tubería PE100 para proyecto VIS', empresa: 'INGEOMEGA', origen: 'WhatsApp', intereses: ['Tubería PE', 'Accesorios'], score: 40, age: '2d', avatar: 'DI', color: 1, asesor: 'J. Pérez' },
    { titulo: 'Cotización tubería 315mm PN10 para vivienda', empresa: 'GAMO INGENIEROS SAS', origen: 'WhatsApp', intereses: ['Tubería PE'], score: 60, age: '0d', avatar: 'GA', color: 5, asesor: 'C. Gómez' },
  ]},
  CONTACTADO: { color: '#A855F7', label: 'Contactado', items: [
    { titulo: 'Cotización accesorio PE para Tocancipa', empresa: 'UNION TEMPORAL BALSA 3', origen: 'WhatsApp', intereses: ['Tubería PE'], score: 60, age: '4d', avatar: 'UT', color: 2, asesor: 'P. Martínez' },
    { titulo: 'Oferta tubería 315mm para proyecto VIS', empresa: 'GAMO INGENIEROS', origen: 'WhatsApp', intereses: ['Tubería PE'], score: 40, age: '5d', avatar: 'GM', color: 5, asesor: 'A. Rojas' },
  ]},
  INTERESADO: { color: '#22C55E', label: 'Interesado', items: [
    { titulo: 'Solicitud tubería industrial para planta', empresa: 'SOLUCIONES HIDRAULICAS', origen: 'WhatsApp', intereses: ['Tubería PE', 'Válvulas'], score: 100, age: '5d', avatar: 'SH', color: 4, asesor: 'C. Gómez' },
    { titulo: 'Cotización manifold para estación', empresa: 'INGENIERIA DEL OCCIDENTE', origen: 'Instagram', intereses: ['Accesorios PE'], score: 80, age: '3d', avatar: 'IO', color: 2, asesor: 'J. Pérez' },
  ]},
  DESCALIFICADO: { color: '#EF4444', label: 'No Interesado', items: [
    { titulo: 'Proyecto alcantarillado EMSERPRE', empresa: 'EMSERPRE', origen: 'Instagram', intereses: ['Tubería PE', 'Accesorios'], score: 20, age: '15d', avatar: 'EM', color: 3, asesor: 'P. Martínez' },
    { titulo: 'Tubería HDPE para San Marcos Sucre', empresa: 'GEOCOR', origen: 'WhatsApp', intereses: ['Tubería PE'], score: 20, age: '20d', avatar: 'GE', color: 6, asesor: 'A. Rojas' },
  ]},
  TRASLADADO: { color: '#F39610', label: 'Trasladado a distribuidor', items: [
    { titulo: 'Cotización tubería 110mm para acueducto veredal', empresa: 'JUNTA ACCION COMUNAL SAN PEDRO', origen: 'Referido', intereses: ['Tubería PE'], score: 33, age: '10d', avatar: 'JP', color: 4, asesor: 'P. Martínez' },
    { titulo: 'Suministro PE para sistema de riego', empresa: 'AGRO CAMPO VERDE SAS', origen: 'WhatsApp', intereses: ['Riego', 'Accesorios'], score: 66, age: '8d', avatar: 'AV', color: 2, asesor: 'C. Gómez' },
  ]},
};

function renderLeadCard(l, estadoKey) {
  const esTrasladado = estadoKey === 'TRASLADADO';
  const footerContent = esTrasladado
    ? `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:#C7770D;max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
        ${Icons.truck} ${l.distribuidor ?? ''}
       </span>`
    : `<div style="display: flex; align-items: center; gap: 8px;">
        <div class="avatar avatar--xs avatar--color-${l.color}">${l.avatar}</div>
        <span class="lead-card__score" style="color:${l.score >= 70 ? '#DC2626' : l.score >= 30 ? '#C7770D' : '#24388C'};">${Icons.fire} ${l.score >= 70 ? 'Caliente' : l.score >= 30 ? 'Tibio' : 'Frío'}</span>
       </div>`;
  return `
    <a href="10-lead-detalle.html" style="text-decoration: none; color: inherit; font: inherit; cursor: pointer;">
      <div class="lead-card" style="${esTrasladado ? 'border-color:#F0D9A8;background:#FFFBF0;' : ''}">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <span class="lead-card__origen">${Icons.globe} ${l.origen}</span>
          ${!esTrasladado ? `<button class="topbar__icon-btn" style="width:24px; height:24px;">${Icons.dots}</button>` : ''}
        </div>
        <div class="lead-card__title">${l.titulo}</div>
        <div class="lead-card__empresa">${l.empresa}</div>
        <div class="lead-card__intereses">
          ${l.intereses.map(i => `<span class="lead-card__interes-chip">${i}</span>`).join('')}
        </div>
        <div class="lead-card__footer">
          ${footerContent}
          <span class="lead-card__age">${l.age}</span>
        </div>
      </div>
    </a>
  `;
}

function renderKanbanColumn(estadoKey) {
  const col = leadsData[estadoKey];
  const esTrasladado = estadoKey === 'TRASLADADO';
  const cards = col.items.map(l => renderLeadCard(l, estadoKey)).join('');
  return `
    <div class="kanban-col"${esTrasladado ? ' style="border-left: 2px solid var(--border); padding-left: 12px;"' : ''}>
      <div class="kanban-col__header">
        <span class="kanban-col__dot" style="background:${col.color}"></span>
        <span class="kanban-col__label">${col.label}</span>
        <span class="kanban-col__count"${esTrasladado ? ' style="background:#FFF4E0;color:#C7770D;"' : ''}>${col.items.length}</span>
      </div>
      <div class="kanban-col__line" style="background:${col.color}"></div>
      <div class="kanban-col__list">
        ${cards || `<div class="kanban-col__empty">Sin leads</div>`}
      </div>
    </div>
  `;
}

function content() {
  const total = Object.values(leadsData).reduce((a,b) => a + b.items.length, 0);
  const columnasKanban = `<div class="kanban" style="grid-template-columns: repeat(5, 1fr);">
    ${renderKanbanColumn('NUEVO')}
    ${renderKanbanColumn('CONTACTADO')}
    ${renderKanbanColumn('INTERESADO')}
    ${renderKanbanColumn('DESCALIFICADO')}
    ${renderKanbanColumn('TRASLADADO')}
  </div>`;

  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Leads del equipo</div>
          <div class="page-head__subtitle">${total} leads en seguimiento · 1 sin contactar hace +2 días</div>
        </div>
        <div class="page-head__actions">
          <button class="btn btn--secondary btn--sm" onclick="toggleFiltros()">${Icons.filter} Filtros</button>
          <a href="11-lead-form.html" style="text-decoration: none; color: inherit; font: inherit; cursor: pointer;">
            <button class="btn btn--primary btn--sm">${Icons.plus} Nuevo lead</button>
          </a>
        </div>
      </div>

      <div class="filter-bar">
        <div class="input-wrapper" style="flex:1; max-width: 320px;">
          ${Icons.search}
          <input class="input input--with-icon" placeholder="Buscar por título, empresa, asesor...">
        </div>
        <select class="select" style="max-width: 160px;">
          <option>Todos los asesores</option>
          <option>P. Martínez</option>
          <option>J. Pérez</option>
          <option>C. Gómez</option>
          <option>A. Rojas</option>
        </select>
        <select class="select" style="max-width: 160px;">
          <option>Todos los orígenes</option>
          <option>Instagram</option>
          <option>Facebook</option>
          <option>WhatsApp</option>
        </select>
        <select class="select" style="max-width: 160px;">
          <option>Todos los intereses</option>
          <option>Tubería PE</option>
          <option>Riego</option>
          <option>Accesorios</option>
        </select>
      </div>

      <div id="filtrosPanel" style="display: none; gap: 12px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: flex-end;">
        <div style="flex: 1; min-width: 200px;">
          <div style="font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;">Rango de score</div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input class="input" placeholder="Min" style="max-width: 80px;" />
            <span style="color: var(--text-muted);">—</span>
            <input class="input" placeholder="Max" style="max-width: 80px;" />
          </div>
        </div>
        <div style="flex: 1; min-width: 200px;">
          <div style="font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;">Antigüedad</div>
          <select class="select">
            <option>Cualquier edad</option>
            <option>Menos de 3 días</option>
            <option>3-7 días</option>
            <option>Más de 7 días</option>
          </select>
        </div>
        <div style="flex: 1; min-width: 200px;">
          <div style="font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;">Solo</div>
          <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <label style="display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer;">
              <input type="checkbox" style="width: 14px; height: 14px;" /> Sin contactar
            </label>
            <label style="display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer;">
              <input type="checkbox" style="width: 14px; height: 14px;" /> Alta prioridad
            </label>
          </div>
        </div>
        <button class="btn btn--ghost btn--sm" onclick="toggleFiltros()">${Icons.close} Cerrar</button>
      </div>

      <div class="alert alert--warning" style="margin-bottom: 16px;">
        ${Icons.warning}
        <div>
          <strong>1 lead estancado.</strong> GAMO INGENIEROS SAS sin contactar hace 1 día.
          El sistema enviará notificación si supera 3 días.
        </div>
      </div>

      ${columnasKanban}
    </div>
  `;
}

document.getElementById('shell').innerHTML = `
  ${renderSidebar('leads', 'coordinador')}
  <div class="main-area">${renderTopbar({ title: 'Leads del equipo' })}${content()}</div>
`;
</script>
</body>
</html>
