<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM Extrucol · Coordinador · Cumplimiento</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
  .cumplimiento-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }

  .meta-row {
    display: grid;
    grid-template-columns: 160px 1fr 110px;
    gap: 14px; align-items: center;
    padding: 10px 0;
  }
  .meta-label { font-size: 12.5px; color: var(--text-secondary); }
  .meta-bar-wrap { position: relative; height: 22px; background: var(--page-bg); border-radius: 6px; overflow: hidden; }
  .meta-bar-fill {
    height: 100%; border-radius: 6px;
    display: flex; align-items: center; padding-left: 10px;
    color: #fff; font-weight: 700; font-size: 11px;
  }
  .meta-line {
    position: absolute; top: -4px; bottom: -4px;
    width: 2px; background: var(--text-primary); z-index: 2;
  }
  .meta-line::after {
    content: 'META'; position: absolute; top: -14px; left: -14px;
    font-size: 8.5px; font-weight: 700; color: var(--text-primary);
    background: #fff; padding: 1px 4px; border-radius: 3px;
  }
  .meta-value {
    font-size: 13px; font-weight: 700; color: var(--text-primary);
    text-align: right;
  }
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script src="../shared/components.js"></script>
<script>
function content() {
  const ejecutivos = [
    {
      name: 'María García', depto: 'Antioquia', color: 2, cumplimiento: 92,
      metas: [
        { label: 'Actividades / semana', actual: 22, meta: 20, pct: 110, color: 'var(--success)' },
        { label: 'Oportunidades activas', actual: 9, meta: 10, pct: 90, color: 'var(--accent)' },
        { label: 'Leads contactados (%)', actual: 95, meta: 80, pct: 119, color: 'var(--success)' },
        { label: 'Tasa conversión', actual: 22, meta: 15, pct: 147, color: 'var(--success)' },
        { label: 'Valor cerrado (M)', actual: 680, meta: 500, pct: 136, color: 'var(--success)' },
      ]
    },
    {
      name: 'Juan Pérez', depto: 'Santander', color: 1, cumplimiento: 85,
      metas: [
        { label: 'Actividades / semana', actual: 18, meta: 20, pct: 90, color: 'var(--accent)' },
        { label: 'Oportunidades activas', actual: 12, meta: 10, pct: 120, color: 'var(--success)' },
        { label: 'Leads contactados (%)', actual: 78, meta: 80, pct: 97, color: 'var(--accent)' },
        { label: 'Tasa conversión', actual: 15, meta: 15, pct: 100, color: 'var(--success)' },
        { label: 'Valor cerrado (M)', actual: 425, meta: 500, pct: 85, color: 'var(--accent)' },
      ]
    },
    {
      name: 'Pedro Salazar', depto: 'Atlántico', color: 5, cumplimiento: 48,
      metas: [
        { label: 'Actividades / semana', actual: 8, meta: 20, pct: 40, color: 'var(--error)' },
        { label: 'Oportunidades activas', actual: 5, meta: 10, pct: 50, color: 'var(--error)' },
        { label: 'Leads contactados (%)', actual: 55, meta: 80, pct: 69, color: 'var(--accent)' },
        { label: 'Tasa conversión', actual: 8, meta: 15, pct: 53, color: 'var(--error)' },
        { label: 'Valor cerrado (M)', actual: 85, meta: 500, pct: 17, color: 'var(--error)' },
      ]
    },
  ];

  const renderCard = (e) => `
    <div class="cumplimiento-card" onclick="window.location.href='05-ejecutivo-perfil.html?id=${e.name.split(' ').map(x=>x[0]).join('')}'" style="cursor: pointer;">
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
        <div class="avatar avatar--lg avatar--color-${e.color}">${e.name.split(' ').map(x=>x[0]).join('')}</div>
        <div style="flex:1;">
          <div style="font-weight: 700; font-size: 15px;">${e.name}</div>
          <div style="font-size: 12px; color: var(--text-muted);">${e.depto}</div>
        </div>
        <div style="text-align: right;">
          <div style="font-size: 28px; font-weight: 800; color: ${e.cumplimiento >= 80 ? 'var(--success)' : e.cumplimiento >= 65 ? 'var(--accent)' : 'var(--error)'}; line-height: 1;">${e.cumplimiento}%</div>
          <div style="font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; margin-top: 2px;">Cumplimiento</div>
        </div>
      </div>

      <div style="padding-top: 12px; border-top: 1px solid var(--border);">
        ${e.metas.map(m => `
          <div class="meta-row">
            <div class="meta-label">${m.label}</div>
            <div class="meta-bar-wrap">
              <div class="meta-line" style="left: ${Math.min(100, m.meta/Math.max(m.meta, m.actual)*100)}%;"></div>
              <div class="meta-bar-fill" style="background: ${m.color}; width: ${Math.min(100, m.pct/Math.max(100, m.pct)*100)}%;">
                ${m.actual >= m.meta ? '✓' : ''} ${m.actual}
              </div>
            </div>
            <div class="meta-value">${m.pct}% · meta ${m.meta}</div>
          </div>
        `).join('')}
      </div>

      ${e.cumplimiento < 65 ? `
        <div style="margin-top: 14px; padding: 10px; background: var(--error-bg); border-radius: 6px; font-size: 12px; color: var(--error);">
          ⚠ <strong>Requiere acompañamiento.</strong> Cumplimiento bajo el umbral crítico (65%)
        </div>
      ` : ''}
    </div>
  `;

  return `
    <div class="content">
      <div class="page-head">
        <div class="page-head__title-group">
          <div class="page-head__title">Reporte de cumplimiento</div>
          <div class="page-head__subtitle">Comparativo de metas vs desempeño · Abril 2026 · Todos los ejecutivos</div>
        </div>
        <div class="page-head__actions">
          <button class="btn btn--secondary btn--sm">${Icons.calendar} Abril 2026</button>
          <button class="btn btn--secondary btn--sm">${Icons.download} PDF</button>
          <a href="02-variables-sistema.html" style="text-decoration: none; color: inherit; font: inherit; cursor: pointer;">
            <button class="btn btn--primary btn--sm">${Icons.adjustments} Ajustar metas</button>
          </a>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;">
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--success">${Icons.trendingUp}</div>
          <div class="stat-card__label">Alto cumplimiento</div>
          <div class="stat-card__value stat-card__value--success">3</div>
          <div class="stat-card__subtext">≥ 80%</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--accent">${Icons.clock}</div>
          <div class="stat-card__label">Cumplimiento medio</div>
          <div class="stat-card__value stat-card__value--accent">2</div>
          <div class="stat-card__subtext">65% - 79%</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon" style="background: var(--error-bg); color: var(--error);">${Icons.trendingDown}</div>
          <div class="stat-card__label">Bajo cumplimiento</div>
          <div class="stat-card__value" style="color: var(--error);">1</div>
          <div class="stat-card__subtext">&lt; 65% (crítico)</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">${Icons.chartBar}</div>
          <div class="stat-card__label">Promedio equipo</div>
          <div class="stat-card__value">78%</div>
          <div class="stat-card__subtext"><span class="stat-card__trend stat-card__trend--up">+4pp</span> vs mes anterior</div>
        </div>
      </div>

      <div style="display: grid; gap: 14px; grid-template-columns: repeat(2, 1fr);">
        ${ejecutivos.map(renderCard).join('')}
      </div>
    </div>
  `;
}

document.getElementById('shell').innerHTML = `
  ${renderSidebar('cumplimiento', 'coordinador')}
  <div class="main-area">
    ${renderTopbar({ title: 'Reporte de cumplimiento' })}
    ${content()}
  </div>
`;
</script>
</body>
</html>
